// ── 유틸리티 ────────────────────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs){
    Object.entries(attrs).forEach(([k,v])=>{
      if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
      else if(k==='class') e.className=v;
      else if(k.startsWith('on')&&typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(),v);
      else if(k==='src') e.src=v;
      else if(k==='alt') e.alt=v;
      else if(k==='loading') e.loading=v;
      else e.setAttribute(k,v);
    });
  }
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false)return;
      e.appendChild(typeof c==='string'?document.createTextNode(c):c);
    });
  }
  return e;
}
function div(s,ch){return el('div',{style:s},ch);}
function span(s,t){return el('span',{style:s},[t]);}
function txt(t){return document.createTextNode(t);}

// 음식 카드 이미지 — 실사사진 우선, 없으면 그라디언트+이모지
function img(key,alt,h){
  const H=h||100;
  const photo=FS_PHOTOS[key];
  if(photo){
    const wrap=div({width:'100%',height:H+'px',overflow:'hidden',flexShrink:0});
    const pi=document.createElement('img');
    pi.src=photo; pi.alt=alt||'';
    pi.style.cssText='width:100%;height:'+H+'px;object-fit:cover;display:block';
    wrap.appendChild(pi);
    return wrap;
  }
  const fs=FS[key]||{e:'🍽️',bg:'#e2e8f0',tx:'#666',label:alt||''};
  const wrap=div({width:'100%',height:H+'px',position:'relative',overflow:'hidden',
    background:fs.bg,flexShrink:0,display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',gap:'2px'});
  const shine=div({position:'absolute',top:'0',left:'0',right:'0',height:'40%',
    background:'rgba(255,255,255,0.12)',borderRadius:'0 0 50% 50%',pointerEvents:'none'});
  wrap.appendChild(shine);

    filter:'drop-shadow(0 2px 4px rgba(0,0,0,0.3))'});
  emojiEl.textContent=fs.e;

  if(H>=80){
    const lbl=div({fontSize:'9px',color:fs.tx,fontWeight:700,opacity:'0.85',
      zIndex:'1',letterSpacing:'0.3px',textShadow:'0 1px 2px rgba(0,0,0,0.4)',
      marginTop:'2px',textAlign:'center',padding:'0 4px',lineHeight:'1.2'});
    lbl.textContent=fs.label||alt||'';
    wrap.appendChild(lbl);
  }
  return wrap;
}

  // 메뉴 그리드
  const grid=div({flex:'1',overflowY:'auto',padding:'7px 6px 7px 7px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',alignContent:'start'});
  const menuList=getMenuList(s.activeCat);
  menuList.forEach(item=>{
    grid.appendChild(renderCard(item,s));
  });
  body.appendChild(grid);
  wrap.appendChild(body);

  // 하단 장바구니 패널
  wrap.appendChild(renderCartPanel(s));
  // 하단 네비 바
  wrap.appendChild(renderNavBar(s));
  wrap.appendChild(vtag());
  return wrap;
}

function getMenuList(cat){
  if(cat==='recommend') return RECOMMENDS;
  if(cat==='burger')    return BURGERS;
  if(cat==='side')      return SIDES;
  if(cat==='drink')     return DRINKS;
  if(cat==='dessert')   return DESSERTS;
  return RECOMMENDS;
}

function renderCard(item, s){
  const isBurger=(s.activeCat==='burger')||(s.activeCat==='recommend'&&item._cat==='burger');
  const inCart=s.cart.filter(c=>c.id===item.id).reduce((a,c)=>a+c.qty,0);
  const priceStr=item.hasSize?((SP[item.hasSize].S).toLocaleString()+'원~'):
                 isBurger?(item.bp.toLocaleString()+'원'):
                 ((item.price||0).toLocaleString()+'원');

  const card=div({background:'#fff',border:inCart?'2px solid #2563eb':'2px solid #eef0f5',borderRadius:'13px',overflow:'hidden',cursor:'pointer',position:'relative',boxShadow:'0 1px 4px rgba(0,0,0,0.05)',display:'flex',flexDirection:'column'});

  if(item.tag){
    const tagEl=div({position:'absolute',top:'6px',left:'6px',background:item.tag==='인기'?'#2563eb':item.tag==='신메뉴'?'#f59e0b':'#94a3b8',color:'#fff',fontSize:'9px',padding:'2px 6px',borderRadius:'20px',fontWeight:700,zIndex:'1'});
    tagEl.textContent=item.tag; card.appendChild(tagEl);
  }
  if(inCart>0){
    const badge=div({position:'absolute',top:'6px',right:'6px',background:'#2563eb',color:'#fff',fontSize:'9px',width:'18px',height:'18px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,zIndex:'1'});
    badge.textContent=inCart; card.appendChild(badge);
  }

  const imgWrap=div({height:'96px',flexShrink:'0',background:'#f0f4f8',overflow:'hidden'});
  imgWrap.appendChild(img(item.img,item.name,96));
  card.appendChild(imgWrap);

  const info=div({padding:'7px 9px 9px',flex:'1',display:'flex',flexDirection:'column',justifyContent:'space-between'});
  const nameEl=el('div',{style:{fontWeight:700,fontSize:'12px',color:'#1e293b',marginBottom:'2px',lineHeight:'1.3'}},[item.name]);
  const descEl=el('div',{style:{fontSize:'9px',color:'#94a3b8',lineHeight:'1.3'}},[item.desc||'']);
  const priceEl=el('div',{style:{fontWeight:800,fontSize:'14px',color:'#2563eb',marginTop:'4px'}},[priceStr]);
  info.appendChild(nameEl); info.appendChild(descEl); info.appendChild(priceEl);
  if(item.hasToppings) info.appendChild(el('div',{style:{fontSize:'9px',color:'#94a3b8',marginTop:'1px'}},['재료 변경 가능']));
  if(item.hasSize)     info.appendChild(el('div',{style:{fontSize:'9px',color:'#2563eb',marginTop:'1px',fontWeight:600}},['S / M / L 선택']));
  if(isBurger)         info.appendChild(el('div',{style:{fontSize:'9px',color:'#94a3b8',marginTop:'1px'}},['단품 / 세트 선택']));
  card.appendChild(info);

  card.addEventListener('click',()=>handleCardClick(item,s));
  return card;
}

function handleCardClick(item,s){
  const isBurger=(s.activeCat==='burger')||(s.activeCat==='recommend'&&item._cat==='burger');
  if(isBurger){
    setState({selectedItem:item,modal:{type:'burger',item}});
  } else if(item.hasToppings){
    setState({selectedItem:item,tops:initTops(item.id),topGroup:'veg',step:1.5});
  } else if(item.hasSize){
    setState({selectedItem:item,modal:{type:'size',item}});
  } else {
    addToCart(item,{},null,null);
  }
}

// ── 1.5: 토핑 ───────────────────────────────────────────────
function renderFF15(){
  const s=state;
  const item=s.selectedItem;
  const te=calcTE(s.tops);
  const baseP=s._subType==='set'?(item.bp+item.sa):s._subType==='large'?(item.bp+item.la):(item.bp||item.price||0);
  const finalP=baseP+te;
  const defs=BURGER_TOPS[item.id]||{};
  const changed=Object.keys(s.tops).filter(k=>!!s.tops[k]!==!!(defs[k])).length;
  const isFromSet=s.pendingSet&&s.selectedItem._subType&&s.selectedItem._subType!=='single';

  const wrap=div({height:'100%',display:'flex',flexDirection:'column',background:'#f8faff'});

  // 헤더
  const hdr=div({background:'#2563eb',padding:'9px 13px',display:'flex',alignItems:'center',gap:'9px',flexShrink:0});
  const backBtn=el('button',{style:{background:'rgba(255,255,255,0.2)',border:'none',color:'#fff',borderRadius:'8px',padding:'5px 9px',cursor:'pointer',fontSize:'13px',fontWeight:700}},['←']);
  backBtn.addEventListener('click',()=>{ if(isFromSet)setState({step:2}); else setState({step:1}); });
  hdr.appendChild(backBtn);
  const hdrTxt=div({flex:'1'});
  hdrTxt.appendChild(el('div',{style:{color:'#fff',fontWeight:800,fontSize:'13px'}},[item.name+' 재료변경']));
  hdrTxt.appendChild(el('div',{style:{color:'rgba(255,255,255,0.7)',fontSize:'10px'}},[changed>0?(changed+'가지 변경됨'):'기본 구성']));
  hdr.appendChild(hdrTxt);
  const priceEl=div({textAlign:'right'});
  priceEl.appendChild(el('div',{style:{color:'#fff',fontWeight:900,fontSize:'14px'}},[finalP.toLocaleString()+'원']));
  if(te>0) priceEl.appendChild(el('div',{style:{color:'#fde68a',fontSize:'9px',fontWeight:700}},['+'+(te).toLocaleString()+'원']));
  hdr.appendChild(priceEl);
  wrap.appendChild(hdr);

  // 버거 미리보기
  const preview=div({background:'#fff',padding:'8px 12px 6px',borderBottom:'1px solid #eef0f5',display:'flex',alignItems:'center',gap:'10px',flexShrink:0});
  const prevImg=div({width:'64px',height:'52px',borderRadius:'8px',overflow:'hidden',flexShrink:0});
  prevImg.appendChild(img(item.img,item.name,52));
  preview.appendChild(prevImg);
  const prevInfo=div({flex:'1',minWidth:'0'});
  prevInfo.appendChild(el('div',{style:{fontSize:'9px',color:'#94a3b8',marginBottom:'3px'}},['현재 구성']));
  const tags=div({display:'flex',flexWrap:'wrap',gap:'3px'});
  TOPPINGS.forEach(t=>{
    if(s.tops[t.id]){
      const isNew=!defs[t.id];
      const tag=div({fontSize:'9px',padding:'2px 5px',borderRadius:'8px',fontWeight:700,background:isNew?'#2563eb':'#f1f5f9',color:isNew?'#fff':'#64748b'});
      tag.textContent=(isNew?'+':'')+t.name; tags.appendChild(tag);
    }
    if(!s.tops[t.id]&&defs[t.id]){
      const tag=div({fontSize:'9px',padding:'2px 5px',borderRadius:'8px',fontWeight:700,background:'#fff0f0',color:'#dc2626',textDecoration:'line-through'});
      tag.textContent=t.name; tags.appendChild(tag);
    }
  });
  prevInfo.appendChild(tags);
  preview.appendChild(prevInfo);
  wrap.appendChild(preview);

  // 탭 (야채/치즈/소스/추가재료)
  const groups=[
    {id:'veg',   label:'야채',    emoji:'🥬',ids:['lettuce','onion','tomato','pickle','jalapeno']},
    {id:'cheese',label:'치즈',    emoji:'🧀',ids:['cheese']},
    {id:'sauce', label:'소스',    emoji:'🍶',ids:['ketchup','mayo','bbq']},
    {id:'extra', label:'추가재료',emoji:'➕',ids:['bacon','egg']},
  ];
  const tabBar=div({display:'flex',background:'#fff',borderBottom:'2px solid #eef0f5',flexShrink:0});
  groups.forEach(g=>{
    const active=s.topGroup===g.id;
    const cnt=g.ids.filter(id=>s.tops[id]).length;
    const tab=el('button',{style:{flex:'1',padding:'6px 2px',background:'none',border:'none',borderBottom:active?'3px solid #2563eb':'3px solid transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'1px',position:'relative'}});
    if(cnt>0){
      const badge=div({position:'absolute',top:'2px',right:'10%',background:'#2563eb',color:'#fff',borderRadius:'50%',width:'12px',height:'12px',fontSize:'8px',fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'});
      badge.textContent=cnt; tab.appendChild(badge);
    }
    tab.appendChild(span({fontSize:'14px'},g.emoji));
    tab.appendChild(span({fontSize:'9px',fontWeight:active?800:500,color:active?'#2563eb':'#94a3b8'},g.label));
    tab.addEventListener('click',()=>setState({topGroup:g.id}));
    tabBar.appendChild(tab);
  });
  wrap.appendChild(tabBar);

  // 토핑 그리드
  const grid=div({flex:'1',overflow:'auto',padding:'8px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',alignContent:'start'});
  const activeGroup=groups.find(g=>g.id===s.topGroup);
  if(activeGroup){
    const gToppings=TOPPINGS.filter(t=>activeGroup.ids.includes(t.id));
    gToppings.forEach(t=>{
      const isOn=!!s.tops[t.id];
      const wasDefault=!!defs[t.id];
      const isNew=isOn&&!wasDefault,isRm=!isOn&&wasDefault;
      const card=el('button',{style:{background:isOn?(isNew?'#eff6ff':'#f0fdf4'):(isRm?'#fff5f5':'#fff'),border:'2px solid '+(isOn?(isNew?'#2563eb':'#22c55e'):(isRm?'#fca5a5':'#e2e8f0')),borderRadius:'10px',padding:'9px 7px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',position:'relative',width:'100%'}});
      if(isNew){const b=div({position:'absolute',top:'3px',right:'3px',background:'#2563eb',color:'#fff',fontSize:'7px',padding:'1px 3px',borderRadius:'3px',fontWeight:800});b.textContent='추가';card.appendChild(b);}
      if(isRm){const b=div({position:'absolute',top:'3px',right:'3px',background:'#dc2626',color:'#fff',fontSize:'7px',padding:'1px 3px',borderRadius:'3px',fontWeight:800});b.textContent='제외';card.appendChild(b);}
      const check=div({position:'absolute',top:'3px',left:'3px',width:'14px',height:'14px',borderRadius:'50%',background:isOn?(isNew?'#2563eb':'#22c55e'):'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'8px',color:'#fff',fontWeight:900});
      check.textContent=isOn?'✓':'';
      card.appendChild(check);
      card.appendChild(span({fontSize:'20px',marginTop:'2px'},t.emoji));
      card.appendChild(span({fontWeight:700,fontSize:'10px',color:isOn?'#1e293b':'#94a3b8',textAlign:'center'},t.name));
      card.appendChild(span({fontSize:'8px',color:'#cbd5e1'},t.kcal+'kcal'));
      if(t.price>0){
        const pr=div({fontSize:'9px',fontWeight:800,color:isOn?'#2563eb':'#cbd5e1',background:isOn?'#eff6ff':'#f8faff',padding:'1px 5px',borderRadius:'5px'});
        pr.textContent='+'+t.price.toLocaleString()+'원'; card.appendChild(pr);
      } else {
        card.appendChild(span({fontSize:'8px',color:isOn?'#22c55e':'#cbd5e1',fontWeight:600},isOn?'✓ 포함':'빼기'));
      }
      card.addEventListener('click',()=>{
        const newTops=Object.assign({},s.tops,{[t.id]:s.tops[t.id]?0:1});
        if(s.pendingSet) setState({tops:newTops,pendingSet:Object.assign({},s.pendingSet,{tops:newTops})});
        else setState({tops:newTops});
      });
      grid.appendChild(card);
    });
  }
  wrap.appendChild(grid);

  // 하단 버튼
  const footer=div({background:'#fff',borderTop:'1px solid #eef0f5',padding:'8px 11px',flexShrink:0});
  const btnRow=div({display:'flex',gap:'7px'});
  const resetBtn=el('button',{style:{flex:'1',padding:'10px 0',background:'#f1f5f9',border:'none',color:'#64748b',borderRadius:'9px',fontWeight:700,cursor:'pointer',fontSize:'11px'}},['🔄 기본으로']);
  resetBtn.addEventListener('click',()=>setState({tops:initTops(item.id)}));
  const confirmBtn=el('button',{style:{flex:'2.5',padding:'10px 0',background:'#2563eb',color:'#fff',border:'none',borderRadius:'9px',fontWeight:800,cursor:'pointer',fontSize:'13px'}});
  if(isFromSet){
    confirmBtn.textContent='완료 · 세트로 돌아가기 →';
    confirmBtn.addEventListener('click',()=>{
      setState({step:2,pendingSet:Object.assign({},s.pendingSet,{tops:s.tops})});
    });
  } else {
    confirmBtn.textContent='담기 · '+finalP.toLocaleString()+'원 →';
    confirmBtn.addEventListener('click',()=>{
      addToCart(item,s.tops,null,item._subType||null);
      setState({step:1});
    });
  }
  btnRow.appendChild(resetBtn); btnRow.appendChild(confirmBtn);
  footer.appendChild(btnRow);
  wrap.appendChild(footer);
  wrap.appendChild(vtag());
  return wrap;
}

// ── 장바구니 헬퍼 ────────────────────────────────────────────
function unitP(item){ return (item.basePrice||0)+(item.toppingExtra||0); }
function addToCart(item,tops,size,subType){
  let bp=item.price??item.bp??0;
  if(subType==='set')   bp=(item.bp||item.price)+(item.sa||2000);
  if(subType==='large') bp=(item.bp||item.price)+(item.la||2500);
  if(size&&item.hasSize){const sp=SP[item.hasSize];if(sp)bp=sp[size];}
  const te=item.hasToppings?calcTE(tops):0;
  const dn=subType==='set'?item.name+' 세트':subType==='large'?item.name+' 라지세트':item.name;
  const ts=item.hasToppings?'':'';
  const key=item.id+'_'+(subType||'')+'_'+(size||'')+'_'+JSON.stringify(tops||{});
  addToCartRaw({...item,cartKey:key,displayName:dn,basePrice:bp,toppingExtra:te,toppingSummary:ts,selectedSize:size,subType,qty:1});
}
function addToCartRaw(newItem){
  setState(s=>{
    const exist=s.cart.find(c=>c.cartKey===newItem.cartKey);
    if(exist) return{cart:s.cart.map(c=>c.cartKey===newItem.cartKey?{...c,qty:c.qty+1}:c),cartOpen:true};
    return{cart:[...s.cart,newItem],cartOpen:true};
  });
}
function removeFromCart(key){
  setState(s=>{
    const e=s.cart.find(c=>c.cartKey===key);
    if(!e)return s;
    if(e.qty===1)return{cart:s.cart.filter(c=>c.cartKey!==key)};
    return{cart:s.cart.map(c=>c.cartKey===key?{...c,qty:c.qty-1}:c)};
  });
}
function addOneCart(key){
  setState(s=>({cart:s.cart.map(c=>c.cartKey===key?{...c,qty:c.qty+1}:c)}));
}

function rcatOf(id){
  for(const cat of RCATS){
    if(RMENU[cat.id]&&RMENU[cat.id].find(m=>m.id===id)) return cat.id;
  }
  return '분식';
}

// SVG를 DOM 노드로 변환
function makeSvgNode(svgStr, w, h){
  const wrap=div({width:w+'px',height:h+'px',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0});
  wrap.innerHTML=svgStr;
  const svg=wrap.querySelector('svg');
  if(svg){ svg.setAttribute('width',w); svg.setAttribute('height',h); }
  return wrap;
}

function renderRestaurant(){
  let rState={
    step:0,       // 0:주문유형 1:메뉴 1.5:옵션 2:결제 3:완료
    orderType:null,
    activeCat:'찌개',
    cart:[],
    cartOpen:true,
    payMethod:null,
    cancelConfirm:false,
    pendingItem:null,   // 옵션 선택 중인 아이템
    pendingOpts:{},     // {optId: true/false}
  };
  function rSetState(patch){
    rState=Object.assign({},rState,typeof patch==='function'?patch(rState):patch);
    rRender();
  }
  const root=div({width:'100%',height:'100%',display:'flex',flexDirection:'column'});

  function rRender(){
    root.innerHTML='';
    if(rState.step===0)       root.appendChild(rStep0());
    else if(rState.step===1)  root.appendChild(rStep1());
    else if(rState.step===1.5)root.appendChild(rStep15());
    else if(rState.step===2)  root.appendChild(rStep2());
    else if(rState.step===3)  root.appendChild(rStep3());
    if(rState.cancelConfirm)  root.appendChild(rCancelModal());
  }

  // ─── 공통: 장바구니 계산 ──────────────────────────────────
  function rGrand(){ return rState.cart.reduce((a,c)=>a+(c.price*c.qty),0); }
  function rTotalQ(){ return rState.cart.reduce((a,c)=>a+c.qty,0); }

  // ─── 공통: 장바구니 추가 ──────────────────────────────────
  function rAddCart(item, opts){
    const optExtra=Object.keys(opts||{}).filter(k=>opts[k]).reduce((a,k)=>{
      const cat=rcatOf(item.id);
      const opt=(ROPTIONS[cat]||[]).find(o=>o.id===k);
      return a+(opt?opt.price:0);
    },0);
    const optLabels=Object.keys(opts||{}).filter(k=>opts[k]).map(k=>{
      const cat=rcatOf(item.id);
      const opt=(ROPTIONS[cat]||[]).find(o=>o.id===k);
      return opt?opt.label:'';
    }).filter(Boolean);
    const cartKey=item.id+'_'+JSON.stringify(opts||{});
    rSetState(s=>{
      const exist=s.cart.find(c=>c.cartKey===cartKey);
      if(exist) return{cart:s.cart.map(c=>c.cartKey===cartKey?{...c,qty:c.qty+1}:c),cartOpen:true};
      return{
        cart:[...s.cart,{
          ...item,cartKey,
          price:item.price+optExtra,
          optExtra,optLabels,qty:1,
        }],
        cartOpen:true,
      };
    });
  }
  function rRemoveOne(cartKey){
    rSetState(s=>{
      const e=s.cart.find(c=>c.cartKey===cartKey);
      if(!e)return s;
      if(e.qty===1)return{cart:s.cart.filter(c=>c.cartKey!==cartKey)};
      return{cart:s.cart.map(c=>c.cartKey===cartKey?{...c,qty:c.qty-1}:c)};
    });
  }

  // ─── 0: 주문 유형 선택 ────────────────────────────────────
  function rStep0(){
    const wrap=div({height:'100%',display:'flex',flexDirection:'column',background:'#fff7ed',position:'relative'});

    // 상단 헤더
    const hdr=div({background:RC,padding:'14px 18px',flexShrink:0});
    const hdrInner=div({display:'flex',alignItems:'center',justifyContent:'space-between'});
    const hdrL=div({display:'flex',alignItems:'center',gap:'12px'});
    const logoBox=div({width:'46px',height:'46px',background:'rgba(255,255,255,0.2)',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'26px'});
    logoBox.textContent='🍱'; hdrL.appendChild(logoBox);
    const logoTxt=div({});
    logoTxt.appendChild(el('div',{style:{color:'#fff',fontWeight:900,fontSize:'18px',letterSpacing:'-0.5px'}},['김밥나라']));
    logoTxt.appendChild(el('div',{style:{color:'rgba(255,255,255,0.7)',fontSize:'11px'}},['맛있고 든든한 한식']));
    hdrL.appendChild(logoTxt); hdrInner.appendChild(hdrL);
    const callBtn=el('button',{style:{background:'#fff',border:'none',color:RC,padding:'8px 14px',borderRadius:'20px',fontSize:'13px',fontWeight:700,cursor:'pointer',boxShadow:'0 2px 8px rgba(0,0,0,0.15)'}},['🔔 직원 호출']);
    hdrInner.appendChild(callBtn); hdr.appendChild(hdrInner);
    wrap.appendChild(hdr);

    // 중앙
    const body=div({flex:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px 24px',gap:'20px'});
    const title=el('h1',{style:{margin:0,fontSize:'26px',fontWeight:900,color:'#1c0a00',textAlign:'center',lineHeight:'1.3'}},['어떻게 드시겠어요?']);
    body.appendChild(title);
    body.appendChild(el('p',{style:{margin:0,color:'#92400e',fontSize:'15px',textAlign:'center'}},['아래 버튼을 눌러주세요']));

    const btns=div({display:'flex',gap:'16px',width:'100%',maxWidth:'340px',marginTop:'8px'});
    [{label:'매장 식사',emoji:'🍽️',sub:'자리에서 드세요'},{label:'포장 주문',emoji:'🛍️',sub:'포장해 가세요'}].forEach((o,i)=>{

      b.appendChild(span({fontSize:'40px'},o.emoji));
      b.appendChild(el('div',{style:{fontSize:'17px',fontWeight:800}},[o.label]));
      b.appendChild(el('div',{style:{fontSize:'12px',color:'#92400e',fontWeight:500}},[o.sub]));
      b.addEventListener('click',()=>rSetState({step:1,orderType:i===0?'dine':'take'}));
      b.addEventListener('mousedown',()=>{b.style.transform='scale(0.96)';b.style.background='#fff7ed'});
      b.addEventListener('mouseup',()=>{b.style.transform='scale(1)';b.style.background='#fff'});
      btns.appendChild(b);
    });
    body.appendChild(btns);
    wrap.appendChild(body);

    // 하단
    const ftr=div({padding:'12px 20px',background:'#fff',borderTop:'2px solid #fed7aa',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0});
    ftr.appendChild(el('span',{style:{fontSize:'12px',color:'#92400e'}},['ⓘ 알레르기 정보는 직원에게 문의해 주세요']));
    const back=el('button',{style:{background:'none',border:'2px solid #fed7aa',color:'#92400e',padding:'6px 14px',borderRadius:'20px',fontSize:'12px',cursor:'pointer',fontWeight:600}},['← 메인으로']);
    back.addEventListener('click',()=>{currentKiosk=null;render();});
    ftr.appendChild(back); wrap.appendChild(ftr);
    wrap.appendChild(vtag());
    return wrap;
  }

  // ─── 1: 메뉴 선택 ─────────────────────────────────────────
  function rStep1(){
    const s=rState;
    const grand=rGrand(), totalQ=rTotalQ();
    const curCat=RCATS.find(c=>c.id===s.activeCat)||RCATS[0];

    const wrap=div({height:'100%',display:'flex',flexDirection:'column',background:'#fafaf8'});

    // 상단 헤더
    const hdr=div({background:'#fff',borderBottom:'2px solid #f0ede8',padding:'10px 14px',flexShrink:0});
    const hdrRow=div({display:'flex',alignItems:'center',justifyContent:'space-between'});
    const hdrL=div({display:'flex',alignItems:'center',gap:'8px'});
    const hdrLogo=div({width:'28px',height:'28px',background:RC,borderRadius:'7px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'15px'});
    hdrLogo.textContent='🍱';
    hdrL.appendChild(hdrLogo);
    hdrL.appendChild(el('span',{style:{fontWeight:800,fontSize:'16px',color:'#1c0a00'}},['김밥나라']));
    hdrRow.appendChild(hdrL);
    const callBtn=el('button',{style:{background:RC,border:'none',color:'#fff',padding:'5px 12px',borderRadius:'14px',fontSize:'11px',fontWeight:700,cursor:'pointer'}},['🔔 직원 호출']);
    hdrRow.appendChild(callBtn); hdr.appendChild(hdrRow);
    hdr.appendChild(el('div',{style:{fontSize:'13px',color:'#1c0a00',fontWeight:700,marginTop:'3px'}},['메뉴를 선택해주세요']));
    wrap.appendChild(hdr);

    // 카테고리 탭
    const tabBar=div({display:'flex',background:'#fff',borderBottom:'2px solid #f0ede8',flexShrink:0,gap:'0'});
    RCATS.forEach(cat=>{
      const active=s.activeCat===cat.id;
      const tab=el('button',{style:{
        flex:'1',padding:'12px 4px',background:active?cat.bg:'#fff',
        border:'none',borderBottom:active?('3px solid '+cat.color):'3px solid transparent',
        cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',
        transition:'all 0.15s',
      }});
      tab.appendChild(span({fontSize:'20px'},cat.emoji));
      tab.appendChild(el('span',{style:{fontSize:'11px',fontWeight:active?800:500,color:active?cat.color:'#94a3b8',lineHeight:'1.2'}},[cat.label]));
      tab.addEventListener('click',()=>rSetState({activeCat:cat.id}));
      tabBar.appendChild(tab);
    });
    wrap.appendChild(tabBar);

    // 메뉴 그리드 (2열, 큰 카드)
    const menuList=RMENU[s.activeCat]||[];
    const grid=div({flex:'1',overflowY:'auto',padding:'10px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',alignContent:'start'});

    menuList.forEach(item=>{
      const inCart=s.cart.filter(c=>c.id===item.id).reduce((a,c)=>a+c.qty,0);
      const card=div({
        background:'#fff',
        border:inCart?'3px solid '+curCat.color:'2px solid #f0ede8',
        borderRadius:'16px',overflow:'hidden',cursor:'pointer',position:'relative',
        boxShadow:'0 2px 8px rgba(0,0,0,0.06)',
        display:'flex',flexDirection:'column',
        transition:'box-shadow 0.15s',
      });

      // 인기 태그
      if(item.tag){
        const tag=div({position:'absolute',top:'8px',left:'8px',background:curCat.color,color:'#fff',fontSize:'10px',padding:'3px 8px',borderRadius:'20px',fontWeight:700,zIndex:'2'});
        tag.textContent=item.tag; card.appendChild(tag);
      }
      // 담은 수량 뱃지
      if(inCart>0){
        const badge=div({position:'absolute',top:'8px',right:'8px',background:curCat.color,color:'#fff',fontSize:'11px',width:'24px',height:'24px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,zIndex:'2'});
        badge.textContent=inCart; card.appendChild(badge);
      }

      // 음식 SVG 이미지
      const imgWrap=div({height:'110px',background:curCat.bg,overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'});
      const photoSrc=FOOD_SVG[item.svgKey+'_photo'];
      if(photoSrc){
        const pi=document.createElement('img');
        pi.src=photoSrc; pi.alt=item.name;
        pi.style.cssText='width:100%;height:110px;object-fit:cover;display:block';
        imgWrap.appendChild(pi);
      } else {
        const svgStr=FOOD_SVG[item.svgKey];
        if(svgStr){
          const svgWrap=div({width:'100%',height:'110px'});
          svgWrap.innerHTML=svgStr;
          const svgEl=svgWrap.querySelector('svg');
          if(svgEl){ svgEl.setAttribute('width','100%'); svgEl.setAttribute('height','110'); svgEl.style.width='100%'; svgEl.style.height='110px'; }
          imgWrap.appendChild(svgWrap);
        }
      }
      card.appendChild(imgWrap);

      // 정보
      const info=div({padding:'10px 10px 12px',flex:'1',display:'flex',flexDirection:'column',gap:'3px'});
      info.appendChild(el('div',{style:{fontWeight:800,fontSize:'14px',color:'#1c0a00',lineHeight:'1.3'}},[item.name]));
      info.appendChild(el('div',{style:{fontSize:'10px',color:'#92400e',lineHeight:'1.4'}},[item.desc]));

      // 가격 + 담기 버튼 행
      const priceRow=div({display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'6px'});
      priceRow.appendChild(el('div',{style:{fontWeight:900,fontSize:'16px',color:RC}},[item.price.toLocaleString()+'원']));

      const addBtn=el('button',{style:{
        width:'32px',height:'32px',borderRadius:'50%',border:'none',
        background:curCat.color,color:'#fff',fontWeight:700,fontSize:'20px',
        display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
        boxShadow:'0 2px 6px rgba(0,0,0,0.15)',flexShrink:0,
      }},['＋']);
      addBtn.addEventListener('click',e=>{
        e.stopPropagation();
        const opts=ROPTIONS[s.activeCat];
        if(opts&&opts.length>0){
          rSetState({pendingItem:item,pendingOpts:{},step:1.5});
        } else {
          rAddCart(item,{});
        }
      });
      priceRow.appendChild(addBtn);
      info.appendChild(priceRow);
      card.appendChild(info);

      card.addEventListener('click',()=>{
        const opts=ROPTIONS[s.activeCat];
        if(opts&&opts.length>0){
          rSetState({pendingItem:item,pendingOpts:{},step:1.5});
        } else {
          rAddCart(item,{});
        }
      });
      card.addEventListener('mouseenter',()=>{card.style.boxShadow='0 4px 16px rgba(0,0,0,0.12)';});
      card.addEventListener('mouseleave',()=>{card.style.boxShadow='0 2px 8px rgba(0,0,0,0.06)';});
      grid.appendChild(card);
    });
    wrap.appendChild(grid);

    // 장바구니 패널
    wrap.appendChild(rCartPanel());

    // 하단 네비
    const nav=div({display:'flex',alignItems:'stretch',borderTop:'2px solid #f0ede8',background:'#fff',flexShrink:0});
    [
      {label:'처음으로',icon:'🏠',action:()=>{if(totalQ>0)rSetState({cancelConfirm:true});else{currentKiosk=null;render();}}},
      {label:'이전 화면',icon:'←', action:()=>{if(totalQ>0)rSetState({cancelConfirm:true});else rSetState({step:0});}},
      {label:'쿠폰',    icon:'🎫', action:null, hi:true},
      {label:'결제',    icon:'💳', action:()=>totalQ>0&&rSetState({step:2}), badge:totalQ, hi2:true, color:RC},
    ].forEach(b=>{
      const btn=el('button',{style:{flex:'1',padding:'10px 2px 8px',background:b.hi2?RC:b.hi?'#fff7ed':'#fff',border:'none',cursor:b.action?'pointer':'default',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',color:b.hi2?'#fff':b.hi?RC:'#555',fontWeight:b.hi||b.hi2?700:500,position:'relative',opacity:(!b.action&&!b.hi&&!b.hi2)?'0.35':'1',minWidth:'0'}});
      btn.appendChild(span({fontSize:'18px'},b.icon));
      btn.appendChild(span({fontSize:'10px'},b.label));
      if(b.badge>0){
        const badge=div({position:'absolute',top:'5px',right:'8%',background:'#fff',color:RC,borderRadius:'50%',width:'17px',height:'17px',fontSize:'10px',fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',border:'1.5px solid '+RC});
        badge.textContent=b.badge; btn.appendChild(badge);
      }
      if(b.action) btn.addEventListener('click',b.action);
      nav.appendChild(btn);
    });
    wrap.appendChild(nav);
    wrap.appendChild(vtag());
    return wrap;
  }

  // ─── 1.5: 옵션 선택 ───────────────────────────────────────
  function rStep15(){
    const s=rState;
    const item=s.pendingItem;
    if(!item) return rStep1();
    const cat=rcatOf(item.id);
    const catInfo=RCATS.find(c=>c.id===cat)||RCATS[0];
    const opts=ROPTIONS[cat]||[];
    const optExtra=Object.keys(s.pendingOpts).filter(k=>s.pendingOpts[k]).reduce((a,k)=>{
      const opt=opts.find(o=>o.id===k);
      return a+(opt?opt.price:0);
    },0);

    const wrap=div({height:'100%',display:'flex',flexDirection:'column',background:'#fafaf8'});

    const hdr=div({background:catInfo.color,padding:'12px 16px',display:'flex',alignItems:'center',gap:'10px',flexShrink:0});

    back.addEventListener('click',()=>rSetState({step:1,pendingItem:null,pendingOpts:{}}));
    hdr.appendChild(back);
    const hdrTxt=div({flex:'1'});
    hdrTxt.appendChild(el('div',{style:{color:'#fff',fontWeight:800,fontSize:'16px'}},[item.name+' 옵션 선택']));
    hdrTxt.appendChild(el('div',{style:{color:'rgba(255,255,255,0.75)',fontSize:'11px'}},['원하는 옵션을 선택하세요 (복수 선택 가능)']));
    hdr.appendChild(hdrTxt);
    wrap.appendChild(hdr);

    // 메뉴 미리보기
    const preview=div({background:'#fff',padding:'14px 16px',borderBottom:'2px solid #f0ede8',display:'flex',alignItems:'center',gap:'14px',flexShrink:0});
    const prevImg=div({width:'80px',height:'72px',borderRadius:'12px',overflow:'hidden',background:catInfo.bg,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'});
    const svgStr=FOOD_SVG[item.svgKey];
    const prevPhoto=FOOD_SVG[item.svgKey+'_photo'];
    if(prevPhoto){
      const ppi=document.createElement('img');
      ppi.src=prevPhoto; ppi.alt=item.name;
      ppi.style.cssText='width:80px;height:72px;object-fit:cover;display:block;border-radius:12px';
      prevImg.appendChild(ppi);
    } else if(svgStr){
      prevImg.innerHTML=svgStr;
      const svgEl=prevImg.querySelector('svg');
      if(svgEl){ svgEl.setAttribute('width','80'); svgEl.setAttribute('height','72'); svgEl.style.width='80px'; svgEl.style.height='72px'; }
    }
    preview.appendChild(prevImg);
    const prevInfo=div({flex:'1'});
    prevInfo.appendChild(el('div',{style:{fontWeight:800,fontSize:'16px',color:'#1c0a00'}},[item.name]));
    prevInfo.appendChild(el('div',{style:{fontSize:'12px',color:'#92400e',marginTop:'3px'}},[item.desc]));
    prevInfo.appendChild(el('div',{style:{fontWeight:800,fontSize:'18px',color:RC,marginTop:'5px'}},[(item.price+optExtra).toLocaleString()+'원']));
    preview.appendChild(prevInfo);
    wrap.appendChild(preview);

    // 옵션 목록
    const optList=div({flex:'1',overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:'10px'});
    optList.appendChild(el('div',{style:{fontSize:'13px',color:'#64748b',fontWeight:600,marginBottom:'4px'}},['옵션을 선택하세요']));

    opts.forEach(opt=>{
      const sel=!!s.pendingOpts[opt.id];
      const optBtn=el('button',{style:{
        display:'flex',alignItems:'center',gap:'14px',padding:'14px 16px',
        background:sel?catInfo.bg:'#fff',
        border:'2px solid '+(sel?catInfo.color:'#e2e8f0'),
        borderRadius:'14px',cursor:'pointer',width:'100%',
        transition:'all 0.15s',
      }});
      // 아이콘
      const icoBox=div({width:'42px',height:'42px',borderRadius:'10px',background:sel?catInfo.color:'#f8faff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px',flexShrink:0,transition:'all 0.15s'});
      icoBox.textContent=opt.icon; optBtn.appendChild(icoBox);
      const optInfo=div({flex:'1',textAlign:'left'});
      optInfo.appendChild(el('div',{style:{fontWeight:700,fontSize:'14px',color:sel?catInfo.color:'#1e293b'}},[opt.label]));
      if(opt.price>0) optInfo.appendChild(el('div',{style:{fontSize:'12px',color:'#94a3b8',marginTop:'2px'}},['+ '+opt.price.toLocaleString()+'원']));
      else optInfo.appendChild(el('div',{style:{fontSize:'12px',color:'#94a3b8',marginTop:'2px'}},['무료']));

    ico2.appendChild(span({fontSize:'24px'},svc.icon)); btn.appendChild(ico2);
    const info=div({textAlign:'left'});
    info.appendChild(el('div',{style:{fontWeight:700,fontSize:'15px',color:'#1e293b'}},[svc.label]));
    info.appendChild(el('div',{style:{fontSize:'11px',color:'#94a3b8',marginTop:'2px'}},[svc.desc]));
    btn.appendChild(info);
    btn.appendChild(span({marginLeft:'auto',color:th.color,fontSize:'18px'},'›'));
    btn.addEventListener('mouseenter',()=>{btn.style.borderColor=th.color;});
    btn.addEventListener('mouseleave',()=>{btn.style.borderColor='transparent';});
    btn.addEventListener('click',()=>{alert('이 기능은 키오스크 훈련 앱에서 간략 버전입니다.\n실제 사용 시 직원에게 문의하세요.');});
    body.appendChild(btn);
  });
  wrap.appendChild(body);
  const ftr=div({padding:'10px 16px',background:'#fff',borderTop:'1px solid #eef0f5',textAlign:'center',flexShrink:0});
  ftr.appendChild(span({fontSize:'10px',color:'#94a3b8'},'ⓘ 도움이 필요하시면 직원에게 문의해 주세요'));
  wrap.appendChild(ftr); wrap.appendChild(vtag());
  return wrap;
}

// ── 공통 버전 태그 ───────────────────────────────────────────
function vtag(){
  const d=div({textAlign:'right',background:'#fff',padding:'1px 8px 4px',flexShrink:0});
  d.appendChild(span({fontSize:'9px',color:'#e2e8f0'},'v'+VER));
  return d;
}

// ── 초기 실행 ────────────────────────────────────────────────
state=initFFState();
render();
</script>
