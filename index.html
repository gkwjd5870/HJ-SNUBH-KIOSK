<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>분당버거 키오스크</title>
<style>

/* ── 리셋 & 기반 ──────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;
  font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
  background:#f5f0e8;
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;outline:none;border:none;background:none}
img{display:block}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

/* ── 앱 컨테이너 ─────────────────────────────────────────── */
#app{
  width:100%;max-width:480px;min-height:100vh;
  background:#fff;
  display:flex;flex-direction:column;
  margin:0 auto;
  box-shadow:0 0 40px rgba(0,0,0,0.15);
  overflow:hidden;position:relative;
}

/* ══════════════════════════════════════════════════
   공통 컴포넌트
   ══════════════════════════════════════════════════ */

/* 상단 헤더 */
.hdr{
  background:#fff;border-bottom:1px solid #f0ebe0;
  padding:10px 14px 8px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
}
.hdr-logo{
  width:40px;height:40px;flex-shrink:0;
  border-radius:10px;overflow:hidden;
  background:#e8100a;display:flex;align-items:center;justify-content:center;
}
.hdr-logo span{font-size:22px}
.hdr-brand{flex:1;min-width:0}
.hdr-brand-name{font-size:17px;font-weight:900;color:#1a0000;letter-spacing:-0.3px}
.hdr-brand-sub{font-size:10px;color:#94a3b8;margin-top:1px}
.hdr-call{
  background:#fff;border:2px solid #e8100a;color:#e8100a;
  padding:7px 12px;border-radius:18px;font-size:12px;font-weight:700;
  flex-shrink:0;
}

/* 단계 표시 바 */
.step-bar{
  background:#fafaf8;border-bottom:1px solid #f0ebe0;
  padding:7px 14px;flex-shrink:0;
  display:flex;align-items:center;gap:0;
}
.step-item{
  display:flex;align-items:center;gap:4px;font-size:11px;color:#bbb;font-weight:600;
}
.step-item.active .step-num{background:#e8100a;color:#fff}
.step-item.done .step-num{background:#22c55e;color:#fff}
.step-num{
  width:20px;height:20px;border-radius:50%;
  background:#e2e8f0;color:#94a3b8;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.step-item.active .step-label{color:#e8100a;font-weight:800}
.step-item.done  .step-label{color:#22c55e}
.step-arrow{margin:0 6px;color:#ddd;font-size:10px}

/* 하단 네비 바 */
.nav-bar{
  background:#fff;border-top:1px solid #f0ebe0;
  display:flex;align-items:stretch;flex-shrink:0;
}
.nav-btn{
  flex:1;padding:10px 2px 9px;background:#fff;border:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:#555;font-size:10px;font-weight:600;position:relative;
  transition:background 0.1s;
}
.nav-btn:active{background:#fafaf8}
.nav-btn-icon{font-size:18px}
.nav-badge{
  position:absolute;top:5px;right:12%;
  width:17px;height:17px;border-radius:50%;
  background:#e8100a;color:#fff;
  font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}

/* 버전 태그 */
.ver{text-align:right;background:#fff;padding:1px 10px 3px;flex-shrink:0;font-size:9px;color:#e8e0d8}

/* 오버레이 팝업 */
.overlay{
  position:absolute;inset:0;
  background:rgba(10,0,0,0.55);
  z-index:80;display:flex;align-items:flex-end;
}
.sheet{
  background:#fff;border-radius:22px 22px 0 0;
  width:100%;padding:18px 16px 28px;
  max-height:88vh;overflow-y:auto;
}
.sheet-handle{
  width:40px;height:4px;background:#e2e8f0;
  border-radius:2px;margin:0 auto 16px;
}

/* 취소 팝업 (중앙) */
.modal-center{
  position:absolute;inset:0;
  background:rgba(10,0,0,0.55);
  z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;
}
.modal-box{
  background:#fff;border-radius:20px;padding:28px 22px;
  width:100%;max-width:300px;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
}

/* ══════════════════════════════════════════════════
   홈 화면 (step 0)
   ══════════════════════════════════════════════════ */
.home-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;gap:22px;
  background:#fff;
}
.home-hero{
  text-align:center;
}
.home-hero h1{font-size:26px;font-weight:900;color:#1a0000;margin-bottom:6px;line-height:1.3}
.home-hero p{font-size:14px;color:#94a3b8}
.home-btns{display:flex;gap:14px;width:100%;max-width:320px}
.home-btn{
  flex:1;padding:28px 10px;background:#fff;
  border:3px solid #e8100a;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  transition:all 0.12s;
}
.home-btn:active{background:#fff5f5;transform:scale(0.97)}
.home-btn-emoji{font-size:42px}
.home-btn-label{font-size:17px;font-weight:900;color:#e8100a}
.home-btn-sub{font-size:12px;color:#94a3b8;font-weight:500}

/* ══════════════════════════════════════════════════
   메뉴 선택 화면 (step 1)
   ══════════════════════════════════════════════════ */
.menu-layout{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  min-height:0;
}
.menu-title-bar{
  padding:10px 14px 6px;background:#fff;
  border-bottom:1px solid #f0ebe0;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.menu-title-bar h2{font-size:16px;font-weight:800;color:#1a0000}

/* 좌측 카테고리 사이드바 */
.menu-main{flex:1;display:flex;overflow:hidden;min-height:0}
.cat-sidebar{
  width:72px;background:#fafaf8;border-right:1px solid #f0ebe0;
  display:flex;flex-direction:column;overflow-y:auto;
  flex-shrink:0;scrollbar-width:none;
}
.cat-sidebar::-webkit-scrollbar{display:none}
.cat-btn{
  width:100%;padding:14px 4px 12px;background:transparent;border:none;
  border-left:3px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all 0.12s;flex-shrink:0;
}
.cat-btn.on{background:#fff5f5;border-left:3px solid #e8100a}
.cat-btn-emoji{font-size:22px}
.cat-btn-label{font-size:10px;font-weight:600;color:#aaa;line-height:1.2;text-align:center}
.cat-btn.on .cat-btn-label{color:#e8100a;font-weight:800}

/* 중앙 카드 그리드 */
.card-grid{
  flex:1;overflow-y:auto;padding:10px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;align-content:start;
  scrollbar-width:none;
}
.card-grid::-webkit-scrollbar{display:none}

/* 메뉴 카드 */
.mcard{
  background:#fff;border:2px solid #f0ebe0;border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  transition:border-color 0.12s,box-shadow 0.12s;
  position:relative;
}
.mcard.incart{border-color:#e8100a;box-shadow:0 4px 14px rgba(232,16,10,0.15)}
.mcard-img{height:108px;overflow:hidden;background:#f5f0e8;flex-shrink:0}
.mcard-img img{width:100%;height:108px;object-fit:cover}
.mcard-tag{
  position:absolute;top:8px;left:8px;
  background:#e8100a;color:#fff;font-size:10px;padding:3px 9px;
  border-radius:20px;font-weight:800;z-index:2;
}
.mcard-badge{
  position:absolute;top:8px;right:8px;
  background:#e8100a;color:#fff;font-size:10px;width:22px;height:22px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;z-index:2;
}
.mcard-body{padding:9px 10px 4px}
.mcard-name{font-size:14px;font-weight:800;color:#1a0000;line-height:1.3}
.mcard-desc{font-size:10px;color:#94a3b8;margin-top:2px;line-height:1.3}
.mcard-price{font-size:17px;font-weight:900;color:#e8100a;margin-top:5px}

/* 카드 하단 버튼 행 (버거: 단품/세트, 나머지: 담기) */
.mcard-btns{
  display:flex;gap:6px;padding:8px 8px 10px;
}
.mcard-btn-outline{
  flex:1;padding:9px 4px;border:2px solid #e8100a;border-radius:10px;
  font-size:12px;font-weight:700;color:#e8100a;background:#fff;
  transition:all 0.12s;
}
.mcard-btn-outline:active{background:#fff5f5}
.mcard-btn-fill{
  flex:1;padding:9px 4px;border:none;border-radius:10px;
  font-size:12px;font-weight:800;color:#fff;background:#e8100a;
  transition:all 0.12s;
}
.mcard-btn-fill:active{background:#c00800}
.mcard-btn-single{
  flex:1;padding:10px 4px;border:none;border-radius:10px;
  font-size:13px;font-weight:800;color:#fff;background:#e8100a;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.mcard-btn-single:active{background:#c00800}

/* ── 장바구니 패널 ──────────────────────────────────────── */
.cart-panel{
  background:#fff;border-top:3px solid #e8100a;flex-shrink:0;
}
.cart-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;background:#fff5f5;border:none;cursor:pointer;font-family:inherit;
  border-bottom:1px solid #fce8e8;
}
.cart-toggle-l{display:flex;align-items:center;gap:6px}
.cart-toggle-title{font-size:14px;font-weight:800;color:#a30000}
.cart-toggle-count{font-size:12px;font-weight:600;color:#e8100a}
.cart-toggle-r{display:flex;align-items:center;gap:8px}
.cart-toggle-total{font-size:15px;font-weight:900;color:#e8100a}
.cart-toggle-arrow{font-size:13px;color:#f87171;display:inline-block;transition:transform 0.2s;line-height:1}
.cart-list{max-height:144px;overflow-y:auto;scrollbar-width:none}
.cart-list::-webkit-scrollbar{display:none}
.cart-row{
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;border-bottom:1px solid #fff5f5;
}
.cart-thumb{
  width:38px;height:38px;border-radius:9px;overflow:hidden;flex-shrink:0;background:#f5f0e8;
}
.cart-thumb img{width:38px;height:38px;object-fit:cover;display:block}
.cart-info{flex:1;min-width:0}
.cart-name{font-size:12px;font-weight:700;color:#1a0000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-sub{font-size:10px;color:#94a3b8;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-price{font-size:12px;font-weight:700;color:#e8100a;margin-top:2px}
.cart-qctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.cart-minus,.cart-plus{
  width:26px;height:26px;border-radius:50%;font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.cart-minus{border:1.5px solid #f0ebe0;background:#fff;color:#555}
.cart-plus{background:#e8100a;color:#fff;border:none}
.cart-qty{font-size:13px;font-weight:700;min-width:16px;text-align:center;color:#1a0000}
.cart-empty{padding:12px 14px;text-align:center;font-size:13px;color:#ccc}
.cart-actions{padding:8px 12px 10px;display:flex;align-items:center;gap:8px}
.cart-del-all{font-size:11px;color:#aaa;background:none;border:none;cursor:pointer}
.cart-checkout{
  flex:1;padding:12px;background:#e8100a;color:#fff;
  border:none;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
}

/* ══════════════════════════════════════════════════
   팝업: 단품 / 세트 선택 (버거타입)
   ══════════════════════════════════════════════════ */
.type-thumb{
  width:72px;height:64px;border-radius:12px;overflow:hidden;flex-shrink:0;background:#f5f0e8;
}
.type-opt{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;border:2px solid #f0ebe0;border-radius:14px;
  cursor:pointer;transition:all 0.12s;background:#fff;
}
.type-opt:active,.type-opt.sel{border-color:#e8100a;background:#fff5f5}
.type-opt-rec{border-color:#e8100a;background:#fff5f5}
.type-opt-info{flex:1}
.type-opt-title{font-size:16px;font-weight:800;color:#1a0000}
.type-opt-desc{font-size:11px;color:#94a3b8;margin-top:3px}
.type-opt-price{text-align:right;flex-shrink:0}
.type-opt-price-val{font-size:17px;font-weight:900;color:#e8100a}
.type-opt-rec-badge{
  font-size:10px;background:#e8100a;color:#fff;
  padding:2px 8px;border-radius:10px;font-weight:700;
  display:inline-block;margin-top:4px;
}

/* ══════════════════════════════════════════════════
   팝업: 세트 구성 확인 + 재료변경/음료변경
   ══════════════════════════════════════════════════ */
.set-section{
  background:#fff;border:2px solid #f0ebe0;border-radius:14px;overflow:hidden;margin-bottom:10px;
}
.set-section.highlight{border-color:#e8100a}
.set-section-hdr{
  padding:9px 13px;background:#fafaf8;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #f0ebe0;
}
.set-section-title{font-size:13px;font-weight:700;color:#334155}
.set-change-btn{
  padding:5px 12px;border:1.5px solid #e8100a;border-radius:10px;
  font-size:11px;font-weight:700;color:#e8100a;background:#fff;cursor:pointer;font-family:inherit;
}
.set-section-body{display:flex;align-items:center;gap:10px;padding:11px 13px}
.set-item-thumb{width:56px;height:50px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#f5f0e8}
.set-item-thumb img{width:56px;height:50px;object-fit:cover;display:block}
.set-item-info{flex:1}
.set-item-name{font-size:14px;font-weight:700;color:#1a0000}
.set-item-sub{font-size:10px;color:#94a3b8;margin-top:2px}
.set-item-price{font-size:13px;font-weight:700;color:#64748b;flex-shrink:0}
.set-item-included{font-size:10px;color:#22c55e;font-weight:600;margin-top:2px}
.set-total-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 13px;background:#fff5f5;border-radius:12px;margin-bottom:12px;
}
.set-total-label{font-size:14px;font-weight:700;color:#7f1d1d}
.set-total-val{font-size:20px;font-weight:900;color:#e8100a}

/* ══════════════════════════════════════════════════
   팝업: 재료 변경 (추가재료 / 빼기재료 세로형)
   ══════════════════════════════════════════════════ */
.top-popup-title{
  text-align:center;font-size:20px;font-weight:900;color:#1a0000;
  margin-bottom:4px;
}
.top-popup-sub{
  text-align:center;font-size:13px;color:#94a3b8;margin-bottom:18px;
}
.top-popup-burger-icon{
  text-align:center;font-size:48px;margin-bottom:6px;
}
.top-popup-burger-name{
  text-align:center;font-size:17px;font-weight:800;color:#1a0000;margin-bottom:18px;
}
.top-section-label{
  display:flex;align-items:center;gap:6px;
  font-size:16px;font-weight:800;margin-bottom:10px;
}
.top-section-label.add{color:#6c2bd9}
.top-section-label.remove{color:#e8100a}
.top-section-label svg{flex-shrink:0}

/* 추가재료 — 체크박스 스타일 */
.top-add-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 14px;border:1.5px solid #e2e8f0;border-radius:12px;
  cursor:pointer;background:#fff;margin-bottom:8px;
  transition:all 0.12s;font-family:inherit;width:100%;
}
.top-add-row.on{border-color:#6c2bd9;background:#faf5ff}
.top-add-checkbox{
  width:26px;height:26px;border:2px solid #e2e8f0;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:all 0.12s;background:#fff;color:transparent;
}
.top-add-row.on .top-add-checkbox{
  border-color:#6c2bd9;background:#6c2bd9;color:#fff;
}
.top-add-label{flex:1;font-size:16px;font-weight:600;color:#1a0000;text-align:left}
.top-add-price{font-size:15px;font-weight:700;color:#94a3b8}
.top-add-row.on .top-add-price{color:#6c2bd9}

/* 빼기재료 — 빨간 체크박스 스타일 */
.top-rm-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 14px;border:1.5px solid #fecaca;border-radius:12px;
  cursor:pointer;background:#fff5f5;margin-bottom:8px;
  transition:all 0.12s;font-family:inherit;width:100%;
}
.top-rm-row.removed{border-color:#e2e8f0;background:#fff}
.top-rm-checkbox{
  width:26px;height:26px;border:2px solid #e8100a;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;background:#e8100a;color:#fff;
  transition:all 0.12s;
}
.top-rm-row.removed .top-rm-checkbox{
  border-color:#e2e8f0;background:#fff;color:transparent;
}
.top-rm-label{flex:1;font-size:16px;font-weight:600;color:#1a0000;text-align:left}
.top-rm-badge{font-size:13px;font-weight:700;color:#e8100a}
.top-rm-row.removed .top-rm-label{color:#94a3b8;text-decoration:line-through}
.top-rm-row.removed .top-rm-badge{color:#94a3b8}
.top-rm-hint{font-size:12px;color:#94a3b8;margin-bottom:14px;margin-top:-4px}

/* 추가금액 표시 */
.top-extra-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;background:#faf5ff;border-radius:10px;
  margin-bottom:14px;
}
.top-extra-label{font-size:14px;font-weight:600;color:#6c2bd9}
.top-extra-val{font-size:17px;font-weight:900;color:#6c2bd9}

/* ══════════════════════════════════════════════════
   팝업: 음료 변경
   ══════════════════════════════════════════════════ */
.drink-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:260px;overflow-y:auto;scrollbar-width:none;
}
.drink-grid::-webkit-scrollbar{display:none}
.drink-card{
  border:2px solid #f0ebe0;border-radius:14px;overflow:hidden;
  cursor:pointer;background:#fff;position:relative;transition:all 0.12s;
}
.drink-card.sel{border-color:#e8100a;box-shadow:0 4px 14px rgba(232,16,10,0.18)}
.drink-card-img{height:80px;overflow:hidden;background:#f5f0e8}
.drink-card-img img{width:100%;height:80px;object-fit:cover;display:block}
.drink-card-info{padding:7px 9px 9px}
.drink-card-name{font-size:12px;font-weight:700;color:#1a0000}
.drink-card-price{font-size:12px;font-weight:700;color:#e8100a;margin-top:3px}
.drink-sel-badge{
  position:absolute;top:6px;right:6px;
  background:#e8100a;color:#fff;border-radius:50%;
  width:20px;height:20px;font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;z-index:2;
}

/* ══════════════════════════════════════════════════
   사이즈 팝업 (비버거 메뉴)
   ══════════════════════════════════════════════════ */
.size-row{display:flex;gap:8px;margin-bottom:12px}
.size-btn{
  flex:1;padding:14px 4px;border:2px solid #f0ebe0;border-radius:12px;
  background:#fff;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:inherit;
}
.size-btn.rec{border-color:#e8100a;background:#fff5f5}
.size-btn:active{background:#fff5f5}
.size-label{font-size:20px;font-weight:900;color:#1a0000}
.size-price{font-size:13px;color:#64748b;font-weight:600}
.size-btn.rec .size-label,.size-btn.rec .size-price{color:#e8100a}
.size-rec-badge{font-size:9px;background:#e8100a;color:#fff;padding:1px 8px;border-radius:10px;font-weight:800}

/* ══════════════════════════════════════════════════
   결제 화면
   ══════════════════════════════════════════════════ */
.pay-summary{
  background:#fff5f5;padding:12px 16px;border-bottom:1px solid #fce8e8;flex-shrink:0;
}
.pay-summary-title{font-size:13px;font-weight:700;color:#a30000;margin-bottom:7px}
.pay-summary-list{max-height:90px;overflow-y:auto;scrollbar-width:none}
.pay-summary-row{display:flex;justify-content:space-between;font-size:12px;color:#334155;margin-bottom:3px;gap:8px}
.pay-summary-row span:last-child{font-weight:700;flex-shrink:0}
.pay-total-row{
  display:flex;justify-content:space-between;
  font-size:17px;font-weight:900;color:#e8100a;
  padding-top:8px;border-top:1px solid #fce8e8;margin-top:6px;
}
.pay-methods{flex:1;padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.pay-method{
  display:flex;align-items:center;gap:12px;
  padding:14px 14px;border:2px solid #f0ebe0;border-radius:14px;
  cursor:pointer;background:#fff;transition:all 0.12s;
}
.pay-method.sel{border-color:#e8100a;background:#fff5f5}
.pay-method-ico{
  width:46px;height:46px;border-radius:10px;background:#f8faff;
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
}
.pay-method.sel .pay-method-ico{background:#fce8e8}
.pay-method-info{flex:1}
.pay-method-name{font-size:14px;font-weight:700;color:#1a0000}
.pay-method-sub{font-size:11px;color:#94a3b8;margin-top:2px}
.pay-method-chk{
  width:26px;height:26px;border-radius:50%;background:#e8100a;
  display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:800;flex-shrink:0;
}
.pay-footer{
  padding:10px 14px 12px;background:#fff;border-top:1px solid #f0ebe0;
  display:flex;gap:10px;flex-shrink:0;
}
.pay-back{
  flex:1;padding:14px;background:#f1f5f9;color:#64748b;
  border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
}
.pay-go{
  flex:2;padding:14px;background:#e8100a;color:#fff;
  border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;
}
.pay-go:disabled{background:#94a3b8;cursor:not-allowed}

/* ══════════════════════════════════════════════════
   완료 화면
   ══════════════════════════════════════════════════ */
.done-body{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 16px;gap:14px;
}
.done-icon{font-size:64px;text-align:center}
.done-title{font-size:22px;font-weight:900;color:#1a0000;text-align:center}
.done-num-box{
  background:#fff;border-radius:18px;padding:20px;width:100%;
  border:2px solid #fce8e8;text-align:center;
  box-shadow:0 4px 16px rgba(232,16,10,0.08);
}
.done-num-label{font-size:14px;color:#64748b;font-weight:600;margin-bottom:4px}
.done-num{font-size:66px;font-weight:900;color:#e8100a;line-height:1}
.done-wait{
  margin-top:12px;padding:9px 18px;background:#fff5f5;border-radius:12px;
  display:inline-flex;align-items:center;gap:6px;
  font-size:15px;font-weight:700;color:#a30000;
}
.done-wait span:last-child{font-size:19px;color:#e8100a;font-weight:900}
.done-receipt{background:#fff;border-radius:14px;padding:14px;width:100%;border:1px solid #f0ebe0}
.done-receipt-title{font-size:13px;font-weight:700;color:#1a0000;margin-bottom:8px}
.done-receipt-row{display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:5px;gap:8px}
.done-receipt-row span:last-child{font-weight:600;flex-shrink:0}
.done-total-row{display:flex;justify-content:space-between;font-weight:800;color:#e8100a;padding-top:8px;border-top:1px solid #f0ebe0;font-size:14px}
.done-rcpt-btns{display:flex;gap:8px;margin-top:6px}
.done-rcpt-btn{
  flex:1;padding:11px;background:#fafaf8;border:1.5px solid #f0ebe0;
  border-radius:11px;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.done-home-btn{
  width:100%;padding:16px;background:#e8100a;color:#fff;
  border:none;border-radius:14px;font-size:16px;font-weight:800;
  cursor:pointer;font-family:inherit;
}

/* ── 리셋 & 기반 ──────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;
  font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
  background:#f5f0e8;
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;outline:none;border:none;background:none}
img{display:block}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

/* ── 앱 컨테이너 ─────────────────────────────────────────── */
#app{
  width:100%;max-width:480px;
  height:100vh;max-height:100vh;
  background:#fff;
  display:flex;flex-direction:column;
  margin:0 auto;
  box-shadow:0 0 40px rgba(0,0,0,0.15);
  overflow:hidden;position:relative;
}

/* ══════════════════════════════════════════════════
   공통 컴포넌트
   ══════════════════════════════════════════════════ */

/* 상단 헤더 */
.hdr{
  background:#fff;border-bottom:1px solid #f0ebe0;
  padding:10px 14px 8px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
}
.hdr-logo{
  width:40px;height:40px;flex-shrink:0;
  border-radius:50%;overflow:hidden;
  background:transparent;display:flex;align-items:center;justify-content:center;
}
.hdr-logo span{font-size:22px}
.hdr-brand{flex:1;min-width:0}
.hdr-brand-name{font-size:17px;font-weight:900;color:#1a0000;letter-spacing:-0.3px}
.hdr-brand-sub{font-size:10px;color:#94a3b8;margin-top:1px}
.hdr-call{
  background:#fff;border:2px solid #e8100a;color:#e8100a;
  padding:7px 12px;border-radius:18px;font-size:12px;font-weight:700;
  flex-shrink:0;
}

/* 단계 표시 바 */
.step-bar{
  background:#fafaf8;border-bottom:1px solid #f0ebe0;
  padding:7px 14px;flex-shrink:0;
  display:flex;align-items:center;gap:0;
}
.step-item{
  display:flex;align-items:center;gap:4px;font-size:11px;color:#bbb;font-weight:600;
}
.step-item.active .step-num{background:#e8100a;color:#fff}
.step-item.done .step-num{background:#22c55e;color:#fff}
.step-num{
  width:20px;height:20px;border-radius:50%;
  background:#e2e8f0;color:#94a3b8;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.step-item.active .step-label{color:#e8100a;font-weight:800}
.step-item.done  .step-label{color:#22c55e}
.step-arrow{margin:0 6px;color:#ddd;font-size:10px}

/* 하단 네비 바 */
.nav-bar{
  background:#fff;border-top:1px solid #f0ebe0;
  display:flex;align-items:stretch;flex-shrink:0;
}
.nav-btn{
  flex:1;padding:10px 2px 9px;background:#fff;border:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  color:#555;font-size:14px;font-weight:700;position:relative;
  transition:background 0.1s;
}
.nav-btn:active{background:#fafaf8}
.nav-btn-icon{font-size:22px}
.nav-badge{
  position:absolute;top:5px;right:12%;
  width:17px;height:17px;border-radius:50%;
  background:#e8100a;color:#fff;
  font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}

/* 버전 태그 */
.ver{text-align:right;background:#fff;padding:1px 10px 3px;flex-shrink:0;font-size:9px;color:#e8e0d8}

/* 오버레이 팝업 */
.overlay{
  position:absolute;inset:0;
  background:rgba(10,0,0,0.55);
  z-index:80;display:flex;align-items:flex-end;
}
.sheet{
  background:#fff;border-radius:22px 22px 0 0;
  width:100%;padding:18px 16px 28px;
  max-height:88vh;overflow-y:auto;
}
.sheet-handle{
  width:40px;height:4px;background:#e2e8f0;
  border-radius:2px;margin:0 auto 16px;
}

/* 취소 팝업 (중앙) */
.modal-center{
  position:absolute;inset:0;
  background:rgba(10,0,0,0.55);
  z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;
}
.modal-box{
  background:#fff;border-radius:20px;padding:28px 22px;
  width:100%;max-width:300px;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
}

/* ══════════════════════════════════════════════════
   홈 화면 (step 0)
   ══════════════════════════════════════════════════ */
.home-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;gap:22px;
  background:#fff;
}
.home-hero{
  text-align:center;
}
.home-hero h1{font-size:26px;font-weight:900;color:#1a0000;margin-bottom:6px;line-height:1.3}
.home-hero p{font-size:14px;color:#94a3b8}
.home-btns{display:flex;gap:14px;width:100%;max-width:320px}
.home-btn{
  flex:1;padding:28px 10px;background:#fff;
  border:3px solid #e8100a;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  transition:all 0.12s;
}
.home-btn:active{background:#fff5f5;transform:scale(0.97)}
.home-btn-emoji{font-size:42px}
.home-btn-label{font-size:17px;font-weight:900;color:#e8100a}
.home-btn-sub{font-size:12px;color:#94a3b8;font-weight:500}

/* ══════════════════════════════════════════════════
   메뉴 선택 화면 (step 1)
   ══════════════════════════════════════════════════ */
.menu-layout{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  min-height:0;min-width:0;
}
.menu-title-bar{
  padding:10px 14px 6px;background:#fff;
  border-bottom:1px solid #f0ebe0;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.menu-title-bar h2{font-size:16px;font-weight:800;color:#1a0000}

/* 좌측 카테고리 사이드바 */
.menu-main{flex:1;display:flex;overflow:hidden;min-height:0;min-width:0}
.cat-sidebar{
  width:72px;background:#fafaf8;border-right:1px solid #f0ebe0;
  display:flex;flex-direction:column;overflow-y:auto;
  flex-shrink:0;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.cat-sidebar::-webkit-scrollbar{display:none}
.cat-btn{
  width:100%;padding:14px 4px 12px;background:transparent;border:none;
  border-left:3px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all 0.12s;flex-shrink:0;
}
.cat-btn.on{background:#fff5f5;border-left:3px solid #e8100a}
.cat-btn-emoji{font-size:22px}
.cat-btn-label{font-size:10px;font-weight:600;color:#aaa;line-height:1.2;text-align:center}
.cat-btn.on .cat-btn-label{color:#e8100a;font-weight:800}

/* 중앙 카드 그리드 */
.card-grid{
  flex:1;overflow-y:auto;padding:10px;
  display:grid;grid-template-columns:1fr 1fr;
  grid-auto-rows:min-content;
  gap:10px;align-content:start;
  scrollbar-width:thin;
  -webkit-overflow-scrolling:touch;
}
.card-grid::-webkit-scrollbar{width:3px}
.card-grid::-webkit-scrollbar-thumb{background:#f0e8e0;border-radius:2px}
.card-grid::-webkit-scrollbar{display:none}

/* 메뉴 카드 */
.mcard{
  background:#fff;border:2px solid #f0ebe0;border-radius:16px;
  overflow:visible;display:flex;flex-direction:column;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  transition:border-color 0.12s,box-shadow 0.12s;
  position:relative;
}
.mcard .mcard-img{border-radius:14px 14px 0 0;overflow:hidden}
.mcard.incart{border-color:#e8100a;box-shadow:0 4px 14px rgba(232,16,10,0.15)}
.mcard-img{height:108px;overflow:hidden;background:#f5f0e8;flex-shrink:0}
.mcard-img img{width:100%;height:108px;object-fit:cover}
.mcard-tag{
  position:absolute;top:8px;left:8px;
  background:#e8100a;color:#fff;font-size:10px;padding:3px 9px;
  border-radius:20px;font-weight:800;z-index:2;
}
.mcard-badge{
  position:absolute;top:8px;right:8px;
  background:#e8100a;color:#fff;font-size:10px;width:22px;height:22px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;z-index:2;
}
.mcard-body{padding:9px 10px 4px}
.mcard-name{font-size:14px;font-weight:800;color:#1a0000;line-height:1.3}
.mcard-desc{font-size:10px;color:#94a3b8;margin-top:2px;line-height:1.3}
.mcard-price{font-size:17px;font-weight:900;color:#e8100a;margin-top:5px}

/* 카드 하단 버튼 행 (버거: 단품/세트, 나머지: 담기) */
.mcard-btns{
  display:flex;gap:6px;padding:8px 8px 10px;
}
.mcard-btn-outline{
  flex:1;padding:9px 4px;border:2px solid #e8100a;border-radius:10px;
  font-size:12px;font-weight:700;color:#e8100a;background:#fff;
  transition:all 0.12s;
}
.mcard-btn-outline:active{background:#fff5f5}
.mcard-btn-fill{
  flex:1;padding:9px 4px;border:none;border-radius:10px;
  font-size:12px;font-weight:800;color:#fff;background:#e8100a;
  transition:all 0.12s;
}
.mcard-btn-fill:active{background:#c00800}
.mcard-btn-single{
  flex:1;padding:10px 4px;border:none;border-radius:10px;
  font-size:13px;font-weight:800;color:#fff;background:#e8100a;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.mcard-btn-single:active{background:#c00800}

/* ── 장바구니 패널 ──────────────────────────────────────── */
.cart-panel{
  background:#fff;border-top:3px solid #e8100a;flex-shrink:0;
}
.cart-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;background:#fff5f5;border:none;cursor:pointer;font-family:inherit;
  border-bottom:1px solid #fce8e8;
}
.cart-toggle-l{display:flex;align-items:center;gap:6px}
.cart-toggle-title{font-size:14px;font-weight:800;color:#a30000}
.cart-toggle-count{font-size:12px;font-weight:600;color:#e8100a}
.cart-toggle-r{display:flex;align-items:center;gap:8px}
.cart-toggle-total{font-size:15px;font-weight:900;color:#e8100a}
.cart-toggle-arrow{font-size:13px;color:#f87171;display:inline-block;transition:transform 0.2s;line-height:1}
.cart-list{max-height:min(144px,20vh);overflow-y:auto;scrollbar-width:none}
.cart-list::-webkit-scrollbar{display:none}
.cart-row{
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;border-bottom:1px solid #fff5f5;
}
.cart-thumb{
  width:38px;height:38px;border-radius:9px;overflow:hidden;flex-shrink:0;background:#f5f0e8;
}
.cart-thumb img{width:38px;height:38px;object-fit:cover;display:block}
.cart-info{flex:1;min-width:0}
.cart-name{font-size:12px;font-weight:700;color:#1a0000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-sub{font-size:10px;color:#94a3b8;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-price{font-size:12px;font-weight:700;color:#e8100a;margin-top:2px}
.cart-qctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.cart-minus,.cart-plus{
  width:26px;height:26px;border-radius:50%;font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.cart-minus{border:1.5px solid #f0ebe0;background:#fff;color:#555}
.cart-plus{background:#e8100a;color:#fff;border:none}
.cart-qty{font-size:13px;font-weight:700;min-width:16px;text-align:center;color:#1a0000}
.cart-empty{padding:12px 14px;text-align:center;font-size:13px;color:#ccc}
.cart-actions{padding:8px 12px 10px;display:flex;align-items:center;gap:8px}
.cart-del-all{font-size:11px;color:#aaa;background:none;border:none;cursor:pointer}
.cart-checkout{
  flex:1;padding:12px;background:#e8100a;color:#fff;
  border:none;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
}

/* ══════════════════════════════════════════════════
   팝업: 단품 / 세트 선택 (버거타입)
   ══════════════════════════════════════════════════ */
.type-thumb{
  width:72px;height:64px;border-radius:12px;overflow:hidden;flex-shrink:0;background:#f5f0e8;
}
.type-opt{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;border:2px solid #f0ebe0;border-radius:14px;
  cursor:pointer;transition:all 0.12s;background:#fff;
}
.type-opt:active,.type-opt.sel{border-color:#e8100a;background:#fff5f5}
.type-opt-rec{border-color:#e8100a;background:#fff5f5}
.type-opt-info{flex:1}
.type-opt-title{font-size:16px;font-weight:800;color:#1a0000}
.type-opt-desc{font-size:11px;color:#94a3b8;margin-top:3px}
.type-opt-price{text-align:right;flex-shrink:0}
.type-opt-price-val{font-size:17px;font-weight:900;color:#e8100a}
.type-opt-rec-badge{
  font-size:10px;background:#e8100a;color:#fff;
  padding:2px 8px;border-radius:10px;font-weight:700;
  display:inline-block;margin-top:4px;
}

/* ══════════════════════════════════════════════════
   팝업: 세트 구성 확인 + 재료변경/음료변경
   ══════════════════════════════════════════════════ */
.set-section{
  background:#fff;border:2px solid #f0ebe0;border-radius:14px;overflow:hidden;margin-bottom:10px;
}
.set-section.highlight{border-color:#e8100a}
.set-section-hdr{
  padding:9px 13px;background:#fafaf8;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #f0ebe0;
}
.set-section-title{font-size:13px;font-weight:700;color:#334155}
.set-change-btn{
  padding:5px 12px;border:1.5px solid #e8100a;border-radius:10px;
  font-size:11px;font-weight:700;color:#e8100a;background:#fff;cursor:pointer;font-family:inherit;
}
.set-section-body{display:flex;align-items:center;gap:10px;padding:11px 13px}
.set-item-thumb{width:56px;height:50px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#f5f0e8}
.set-item-thumb img{width:56px;height:50px;object-fit:cover;display:block}
.set-item-info{flex:1}
.set-item-name{font-size:14px;font-weight:700;color:#1a0000}
.set-item-sub{font-size:10px;color:#94a3b8;margin-top:2px}
.set-item-price{font-size:13px;font-weight:700;color:#64748b;flex-shrink:0}
.set-item-included{font-size:10px;color:#22c55e;font-weight:600;margin-top:2px}
.set-total-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 13px;background:#fff5f5;border-radius:12px;margin-bottom:12px;
}
.set-total-label{font-size:14px;font-weight:700;color:#7f1d1d}
.set-total-val{font-size:20px;font-weight:900;color:#e8100a}

/* ══════════════════════════════════════════════════
   팝업: 재료 변경 (추가재료 / 빼기재료 세로형)
   ══════════════════════════════════════════════════ */
.top-popup-title{
  text-align:center;font-size:20px;font-weight:900;color:#1a0000;
  margin-bottom:4px;
}
.top-popup-sub{
  text-align:center;font-size:13px;color:#94a3b8;margin-bottom:18px;
}
.top-popup-burger-icon{

function makeImg(key,alt,h){
  const photo=FS_PHOTOS[key];
  const wrap=document.createElement('div');
  wrap.style.cssText=`width:100%;height:${h}px;overflow:hidden;flex-shrink:0;background:#f5f0e8`;
  if(photo){
    const i=document.createElement('img');
    i.src=photo;i.alt=alt||'';
    i.style.cssText=`width:100%;height:${h}px;object-fit:cover;display:block`;
    wrap.appendChild(i);
  } else {
    wrap.style.cssText+=';display:flex;align-items:center;justify-content:center;font-size:'+(Math.floor(h*0.38))+'px';
    wrap.textContent='🍽️';
  }
  return wrap;
}
function makeThumb(key,alt,size){
  const photo=FS_PHOTOS[key];
  const wrap=document.createElement('div');
  wrap.style.cssText=`width:${size}px;height:${size}px;border-radius:${size>40?10:8}px;overflow:hidden;flex-shrink:0;background:#f5f0e8`;
  if(photo){
    const i=document.createElement('img');i.src=photo;i.alt=alt||'';
    i.style.cssText=`width:${size}px;height:${size}px;object-fit:cover;display:block`;
    wrap.appendChild(i);
  } else {
    wrap.style.display='flex';wrap.style.alignItems='center';wrap.style.justifyContent='center';
    wrap.style.fontSize=Math.floor(size*0.4)+'px';wrap.textContent='🍽️';
  }
  return wrap;
}

let S = initState();
function initState(){
  return {
    step:0,
    activeCat:'burger',
    orderType:null,
    cart:[],
    cartOpen:true,
    payMethod:null,
    cancelConfirm:false,
    discount:null,
    pointPhone:'',
    pointPopup:false,
    taskOpen:false,
    popup:null,
  };
}

const unitP = i => (i.basePrice||0)+(i.toppingExtra||0);
const rowT  = i => unitP(i)*i.qty;
const grand = ()=> S.cart.reduce((s,c)=>s+rowT(c),0);
const totalQ= ()=> S.cart.reduce((s,c)=>s+c.qty,0);

function setState(patch){
  S=Object.assign({},S,typeof patch==='function'?patch(S):patch);
  render();
}

function addToCartRaw(item){
  setState(s=>{
    const e=s.cart.find(c=>c.cartKey===item.cartKey);
    if(e)return{cart:s.cart.map(c=>c.cartKey===item.cartKey?{...c,qty:c.qty+1}:c),cartOpen:true};
    return{cart:[...s.cart,item],cartOpen:true};
  });
}
function removeOne(k){ setState(s=>{ const e=s.cart.find(c=>c.cartKey===k); if(!e)return s; if(e.qty===1)return{cart:s.cart.filter(c=>c.cartKey!==k)}; return{cart:s.cart.map(c=>c.cartKey===k?{...c,qty:c.qty-1}:c)}; }); }
function addOne(k){ setState(s=>({cart:s.cart.map(c=>c.cartKey===k?{...c,qty:c.qty+1}:c)})); }

// ── 메인 렌더 ─────────────────────────────────────────────
const appEl=document.getElementById('app');
function render(){
  appEl.innerHTML='';
  const wrap=el('div',{style:{width:'100%',height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}});

  if(S.step===0){ wrap.appendChild(renderHome()); }
  else if(S.step===1){ wrap.appendChild(renderMenuHdr()); wrap.appendChild(renderStepBar(1)); wrap.appendChild(renderMenuBody()); wrap.appendChild(renderCartPanel()); wrap.appendChild(renderNavBar()); }
  else if(S.step===2){ wrap.appendChild(renderPayHdr()); wrap.appendChild(renderStepBar(2)); wrap.appendChild(renderPayment()); }
  else if(S.step===3){ wrap.appendChild(renderDoneHdr()); wrap.appendChild(renderDone()); }

  if(S.popup) wrap.appendChild(renderPopup());
  if(S.cancelConfirm) wrap.appendChild(renderCancelModal());
  if(S.taskOpen) wrap.appendChild(renderTaskOverlay());

  wrap.appendChild(el('div',{class:'ver'},[S.step<=1?'v'+VER:'']));
  appEl.appendChild(wrap);
}

function renderStepBar(cur){
  const bar=div('step-bar');
  const steps=[{n:1,l:'메뉴 선택'},{n:2,l:'결제하기'},{n:3,l:'주문 완료'}];
  steps.forEach((s,i)=>{
    const cls='step-item'+(cur===s.n?' active':cur>s.n?' done':'');
    const it=div(cls);
    const nm=div('step-num',String(s.n));if(cur>s.n)nm.textContent='✓';
    it.appendChild(nm);
    it.appendChild(el('span',{class:'step-label'},s.l));
    bar.appendChild(it);
    if(i<steps.length-1)bar.appendChild(el('span',{class:'step-arrow'},'›'));
  });
  return bar;
}

function renderMenuBody(){
  const body=div('menu-layout');

  // 제목 바
  const tb=div('menu-title-bar');
  const cat=CATS.find(c=>c.id===S.activeCat);
  tb.appendChild(el('div',{style:{width:'4px',height:'18px',background:'#e8100a',borderRadius:'2px',flexShrink:0}},''));
  tb.appendChild(el('h2',{},cat?cat.emoji+' '+cat.label:'메뉴'));
  body.appendChild(tb);

  const main=div('menu-main');

  // 카테고리 사이드바
  const sidebar=div('cat-sidebar');
  CATS.forEach(cat=>{
    const b=el('button',{class:'cat-btn'+(S.activeCat===cat.id?' on':'')});
    b.appendChild(el('span',{class:'cat-btn-emoji'},cat.emoji));
    b.appendChild(el('span',{class:'cat-btn-label'},cat.label));
    b.addEventListener('click',()=>setState({activeCat:cat.id}));
    sidebar.appendChild(b);
  });
  main.appendChild(sidebar);

  // 카드 그리드
  const grid=div('card-grid');
  getItems().forEach(item=>{
    grid.appendChild(makeCard(item));
  });
  main.appendChild(grid);
  body.appendChild(main);
  return body;
}

function getItems(){
  if(S.activeCat==='burger') return BURGERS;
  if(S.activeCat==='side')   return SIDES;
  if(S.activeCat==='drink')  return DRINKS;
  if(S.activeCat==='dessert')return DESSERTS;
  return BURGERS;
}

function makeCard(item){
  const isBurger=(S.activeCat==='burger'||item.bp!=null);
  const inCart=S.cart.filter(c=>c.id===item.id).reduce((a,c)=>a+c.qty,0);
  const card=div('mcard'+(inCart?' incart':''));

  if(item.tag){const t=div('mcard-tag');t.textContent=item.tag;card.appendChild(t);}
  if(inCart>0){const b=div('mcard-badge');b.textContent=inCart;card.appendChild(b);}

  const imgW=div('mcard-img');imgW.appendChild(makeImg(item.img,item.name,108));card.appendChild(imgW);

  const body=div('mcard-body');
  body.appendChild(el('div',{class:'mcard-name'},item.name));
  body.appendChild(el('div',{class:'mcard-desc'},item.desc||''));
  if(isBurger){
    body.appendChild(el('div',{class:'mcard-price'},(item.bp).toLocaleString()+'원'));
  } else if(item.hasSize){
    body.appendChild(el('div',{class:'mcard-price'},SP[item.hasSize].S.toLocaleString()+'원~'));
  } else {
    body.appendChild(el('div',{class:'mcard-price'},(item.price).toLocaleString()+'원'));
  }
  card.appendChild(body);

  // 버튼 행
  const btns=div('mcard-btns');
  if(isBurger){
    // 단품 → 바로 재료변경, 세트 → 세트구성 팝업
    const b1=el('button',{class:'mcard-btn-outline'},'단품 주문');
    b1.addEventListener('click',e=>{e.stopPropagation();
      setState({popup:{t:'topping',item,subType:'single',tops:initTops(item.id),fromSet:false}});
    });
    const b2=el('button',{class:'mcard-btn-fill'},'세트 주문');
    b2.addEventListener('click',e=>{e.stopPropagation();
      setState({popup:{t:'set_config',item,subType:'set',tops:initTops(item.id),drinkId:20,topGroup:'veg'}});
    });
    btns.appendChild(b1);btns.appendChild(b2);
  } else if(item.hasSize){
    const b=el('button',{class:'mcard-btn-single'},'＋  담기');
    b.addEventListener('click',e=>{e.stopPropagation();setState({popup:{t:'size',item}});});
    btns.appendChild(b);
  } else {
    const b=el('button',{class:'mcard-btn-single'},'＋  담기');
    b.addEventListener('click',e=>{e.stopPropagation();
      addToCartRaw({...item,cartKey:item.id+'_s',displayName:item.name,basePrice:item.price||0,toppingExtra:0,toppingSummary:null,qty:1});
    });
    btns.appendChild(b);
  }
  card.appendChild(btns);
  card.addEventListener('click',()=>{
    if(isBurger) setState({popup:{t:'topping',item,subType:'single',tops:initTops(item.id),fromSet:false}});
    else if(item.hasSize) setState({popup:{t:'size',item}});
    else addToCartRaw({...item,cartKey:item.id+'_s',displayName:item.name,basePrice:item.price||0,toppingExtra:0,toppingSummary:null,qty:1});
  });
  return card;
}

// ── 장바구니 패널 ─────────────────────────────────────────
function renderCartPanel(){
  const q=totalQ(),g=grand();
  const panel=div('cart-panel');

  const tog=el('button',{class:'cart-toggle'});
  const tl=div('cart-toggle-l');
  tl.appendChild(el('span',{class:'cart-toggle-title'},'🛒 주문 내역 '));
  tl.appendChild(el('span',{class:'cart-toggle-count'},'('+q+'개)'));
  tog.appendChild(tl);
  const tr=div('cart-toggle-r');
  if(q>0)tr.appendChild(el('span',{class:'cart-toggle-total'},g.toLocaleString()+'원'));
  tr.appendChild(el('span',{class:'cart-toggle-arrow',style:{transform:S.cartOpen?'rotate(180deg)':'rotate(0)'}}, '▲'));
  tog.appendChild(tr);
  tog.addEventListener('click',()=>setState({cartOpen:!S.cartOpen}));
  panel.appendChild(tog);

  if(!S.cartOpen)return panel;

  const list=div('cart-list');
  if(S.cart.length===0){
    list.appendChild(el('div',{class:'cart-empty'},'메뉴를 선택하면 여기에 담깁니다'));
  } else {
    S.cart.forEach(item=>{
      const row=div('cart-row');
      const th=div('cart-thumb');th.appendChild(makeThumb(item.img||'bulgogi',item.name,38));row.appendChild(th);
      const inf=div('cart-info');
      inf.appendChild(el('div',{class:'cart-name'},item.displayName||item.name));
      if(item.toppingSummary)inf.appendChild(el('div',{class:'cart-sub'},item.toppingSummary));
      inf.appendChild(el('div',{class:'cart-price'},unitP(item).toLocaleString()+'원'));
      row.appendChild(inf);
      const qc=div('cart-qctrl');
      const m=el('button',{class:'cart-minus'},'−');m.addEventListener('click',e=>{e.stopPropagation();removeOne(item.cartKey);});
      const qEl=el('span',{class:'cart-qty'},String(item.qty));
      const p=el('button',{class:'cart-plus'},'＋');p.addEventListener('click',e=>{e.stopPropagation();addOne(item.cartKey);});
      qc.appendChild(m);qc.appendChild(qEl);qc.appendChild(p);row.appendChild(qc);
      list.appendChild(row);
    });
  }
  panel.appendChild(list);

  if(S.cart.length>0){
    const act=div('cart-actions');
    const del=el('button',{class:'cart-del-all'},'전체 삭제');
    del.addEventListener('click',()=>setState({cancelConfirm:true}));
    act.appendChild(del);
    const go=el('button',{class:'cart-checkout'},'💳  결제하기  '+g.toLocaleString()+'원');
    go.addEventListener('click',()=>setState({step:2}));
    act.appendChild(go);
    panel.appendChild(act);
  }
  return panel;
}

   {icon:'←',label:'이전 단계',act:()=>{if(q>0)setState({cancelConfirm:true});else setState({step:0})}},
   {icon:'🎫',label:'쿠폰 사용',act:null,hi:true},
   {icon:'🛒',label:'장바구니',act:()=>q>0&&setState({step:2}),badge:q},
  ].forEach(b=>{
    const nb=el('button',{class:'nav-btn',style:{opacity:(!b.act&&!b.hi)?'0.4':'1'}});
    nb.appendChild(el('span',{class:'nav-btn-icon'},b.icon));
    nb.appendChild(document.createTextNode(b.label));
    if(b.badge>0){const bg=div('nav-badge');bg.textContent=b.badge;nb.appendChild(bg);}
    if(b.act)nb.addEventListener('click',b.act);
    bar.appendChild(nb);
  });
  return bar;
}

// ── 팝업 ─────────────────────────────────────────────────
function renderPopup(){
  const p=S.popup;
  const ov=div('overlay');
  ov.addEventListener('click',e=>{if(e.target===ov)setState({popup:null});});
  const sh=div('sheet');
  sh.appendChild(div('sheet-handle'));

  if(p.t==='burger_type')  sh.appendChild(renderBurgerTypePopup(p));
  if(p.t==='set_config')   sh.appendChild(renderSetConfigPopup(p));
  if(p.t==='topping')      sh.appendChild(renderToppingPopup(p));
  if(p.t==='drink')        sh.appendChild(renderDrinkPopup(p));
  if(p.t==='size')         sh.appendChild(renderSizePopup(p));

  ov.appendChild(sh);
  return ov;
}

// 팝업: 재료 변경 (추가재료 그룹탭 / 빼기재료 세로형)
function renderToppingPopup(p){
  const item=p.item;
  const te=calcTE(p.tops);
  const defs=BURGER_TOPS[item.id]||{};
  const activeGroup=p.topGroup||'veg';
  const wrap=document.createDocumentFragment();

  // 버거 아이콘 + 이름
  wrap.appendChild(el('div',{class:'top-popup-burger-icon'},'🍔'));
  wrap.appendChild(el('div',{class:'top-popup-burger-name'},item.name));

  // ── 추가 재료 섹션 ─────────────────────────────────────
  const addLabel=div('top-section-label add');
  addLabel.innerHTML=`<svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="8" fill="#6c2bd9"/><path d="M9 5v8M5 9h8" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>`;
  addLabel.appendChild(document.createTextNode(' 추가 재료'));
  wrap.appendChild(addLabel);

  // 그룹 탭
  const tabs=el('div',{style:{display:'flex',gap:'6px',marginBottom:'12px',overflowX:'auto',scrollbarWidth:'none',paddingBottom:'2px'}});
  TOP_GROUPS.forEach(g=>{
    const isOn=activeGroup===g.id;
    const t=el('button',{style:{
      padding:'7px 13px',borderRadius:'20px',
      border:'1.5px solid '+(isOn?'#6c2bd9':'#e2e8f0'),
      background:isOn?'#6c2bd9':'#fff',
      color:isOn?'#fff':'#64748b',
      fontSize:'12px',fontWeight:isOn?800:600,
      cursor:'pointer',whiteSpace:'nowrap',
      fontFamily:'inherit',flexShrink:'0',
    }},g.label);
    t.addEventListener('click',()=>setState({popup:{...p,topGroup:g.id}}));
    tabs.appendChild(t);
  });
  wrap.appendChild(tabs);

  // 선택된 그룹의 재료 세로 리스트
  const ag=TOP_GROUPS.find(g=>g.id===activeGroup)||TOP_GROUPS[0];
  const groupToppings=TOPPINGS.filter(t=>ag.ids.includes(t.id));
  groupToppings.forEach(t=>{
    const isOn=!!p.tops[t.id];
    const row=el('button',{class:'top-add-row'+(isOn?' on':'')});
    const chk=div('top-add-checkbox');chk.textContent=isOn?'✓':'';row.appendChild(chk);
    row.appendChild(el('span',{class:'top-add-label'},t.name));
    row.appendChild(el('span',{class:'top-add-price'},t.price>0?'+'+t.price.toLocaleString()+'원':'무료'));
    row.addEventListener('click',()=>{
      const nt=Object.assign({},p.tops,{[t.id]:p.tops[t.id]?0:1});
      setState({popup:{...p,tops:nt,topGroup:activeGroup}});
    });
    wrap.appendChild(row);
  });

  // 추가금액 표시
  if(te>0){
    const extra=div('top-extra-row');
    extra.appendChild(el('span',{class:'top-extra-label'},'추가 금액'));
    extra.appendChild(el('span',{class:'top-extra-val'},'+'+te.toLocaleString()+'원'));
    wrap.appendChild(extra);
  } else {
    wrap.appendChild(el('div',{style:{height:'10px'}},''));
  }

  // ── 빼기 재료 섹션 ─────────────────────────────────────
  const rmLabel=div('top-section-label remove');
  rmLabel.innerHTML=`<svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="8" fill="#e8100a"/><path d="M5 9h8" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>`;
  rmLabel.appendChild(document.createTextNode(' 빼기 재료'));
  wrap.appendChild(rmLabel);
  wrap.appendChild(el('div',{class:'top-rm-hint'},'클릭하면 제거됩니다'));

  // 이 버거의 기본 포함 재료 중 REMOVE_TOPPINGS에 있는 것만 표시
  const defaultIds=Object.keys(defs).filter(k=>defs[k]);
  const rmItems=REMOVE_TOPPINGS.filter(t=>defaultIds.includes(t.id));
  if(rmItems.length===0){
    wrap.appendChild(el('div',{style:{fontSize:'13px',color:'#94a3b8',padding:'8px 0',marginBottom:'8px'}},'제거 가능한 기본 재료가 없습니다.'));
  } else {
    rmItems.forEach(t=>{
      // p.tops에서 해당 재료 상태 (기본 포함이므로 tops에 없으면 1로 간주)
      const included = p.tops[t.id]!==0; // undefined(미설정)=포함, 1=포함, 0=제거
      const row=el('button',{class:'top-rm-row'+(included?'':' removed')});
      const chk=div('top-rm-checkbox');chk.textContent=included?'■':'';row.appendChild(chk);
      row.appendChild(el('span',{class:'top-rm-label'},t.name));
      row.appendChild(el('span',{class:'top-rm-badge'},included?'포함됨':'제거됨'));
      row.addEventListener('click',()=>{
        const cur=p.tops[t.id];
        // undefined/1 → 0(제거), 0 → 1(복원)
        const next=(cur===0)?1:0;
        const nt=Object.assign({},p.tops,{[t.id]:next});
        setState({popup:{...p,tops:nt,topGroup:activeGroup}});
      });
      wrap.appendChild(row);
    });
  }

  // ── 하단 버튼 ───────────────────────────────────────────
  const footRow=el('div',{style:{display:'flex',gap:'10px',marginTop:'18px'}});
  const skipBtn=el('button',{style:{flex:'1',padding:'16px',background:'#fff',border:'2px solid #e2e8f0',borderRadius:'14px',fontSize:'16px',fontWeight:700,color:'#64748b',cursor:'pointer',fontFamily:'inherit'}},'건너뛰기');
  skipBtn.addEventListener('click',()=>{
    if(p.fromSet){
      setState({popup:{t:'set_config',item,subType:p.subType,tops:initTops(item.id),drinkId:p.drinkId,topGroup:'veg'}});
    } else {
      addToCartRaw({...item,cartKey:item.id+'_single_{}',displayName:item.name,basePrice:item.bp,toppingExtra:0,toppingSummary:null,qty:1});
      setState({popup:null});
    }
  });

  const doneBtn=el('button',{style:{flex:'2',padding:'16px',background:'#e8100a',color:'#fff',border:'none',borderRadius:'14px',fontSize:'16px',fontWeight:800,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}});
  doneBtn.innerHTML=(p.fromSet?'완료 — 세트로 돌아가기 →':'🛒&nbsp; 장바구니에 담기');
  doneBtn.addEventListener('click',()=>{
    if(p.fromSet){
      setState({popup:{t:'set_config',item,subType:p.subType,tops:p.tops,drinkId:p.drinkId,topGroup:'veg'}});
    } else {
      const tSummary=[];
      // 추가된 재료 (무료 포함 전부)
      TOPPINGS.forEach(t=>{
        if(p.tops[t.id]){
          const isNew=!defs[t.id];
          if(isNew) tSummary.push(t.name+' 추가'+(t.price>0?' (+'+t.price.toLocaleString()+'원)':''));
        }
      });
      // 제거된 기본 재료
      REMOVE_TOPPINGS.forEach(t=>{if(defs[t.id]&&p.tops[t.id]===0)tSummary.push(t.name+' 제외');});
      addToCartRaw({
        ...item,
        cartKey:item.id+'_single_'+JSON.stringify(p.tops),
        displayName:item.name,
        basePrice:item.bp,
        toppingExtra:te,
        toppingSummary:tSummary.length?tSummary.join(', ')+(te>0?' (+'+te.toLocaleString()+'원)':''):null,
        qty:1,
      });
      setState({popup:null});
    }
  });
  footRow.appendChild(skipBtn);footRow.appendChild(doneBtn);
  wrap.appendChild(footRow);
  return wrap;
}

// ── 결제 화면 ────────────────────────────────────────────
function renderPayment(){
  const g=grand();
  const disc=S.discount;
  const discAmt=disc?Math.floor(g*disc.rate/100):0;
  const finalAmt=g-discAmt;

  const wrap=el('div',{style:{flex:'1',display:'flex',flexDirection:'column',overflow:'hidden'}});

  // 주문 내역 요약
  const sumWrap=div('pay-summary');
  sumWrap.appendChild(el('div',{class:'pay-summary-title'},'📋 주문 내역 확인'));
  const sl=div('pay-summary-list');
  S.cart.forEach(item=>{
    const row=div('pay-summary-row');
    row.appendChild(el('span',{},(item.displayName||item.name)+' ×'+item.qty+(item.toppingSummary?' ('+item.toppingSummary+')':'')));
    row.appendChild(el('span',{},rowT(item).toLocaleString()+'원'));
    sl.appendChild(row);
  });
  sumWrap.appendChild(sl);
  if(discAmt>0){
    const dr=div('pay-summary-row');
    dr.style.color='#e8100a';dr.style.marginTop='4px';
    dr.appendChild(el('span',{},'🎫 '+disc.label+' ('+disc.rate+'%)'));
    dr.appendChild(el('span',{},'-'+discAmt.toLocaleString()+'원'));
    sl.appendChild(dr);
  }
  const totR=div('pay-total-row');
  if(discAmt>0){
    totR.appendChild(el('span',{},'총 결제금액'));
    const priceWrap=el('div',{style:{display:'flex',alignItems:'center',gap:'8px'}});
    priceWrap.appendChild(el('span',{style:{fontSize:'13px',color:'#94a3b8',textDecoration:'line-through'}},g.toLocaleString()+'원'));
    priceWrap.appendChild(el('span',{style:{fontSize:'20px',fontWeight:900,color:'#e8100a'}},finalAmt.toLocaleString()+'원'));
    totR.appendChild(priceWrap);
  } else {
    totR.appendChild(el('span',{},'총 결제금액'));
    totR.appendChild(el('span',{},g.toLocaleString()+'원'));
  }
  sumWrap.appendChild(totR);
  wrap.appendChild(sumWrap);

  // 할인 선택
  const discSec=div('discount-section');
  const discTitle=div('discount-title');
  discTitle.innerHTML='🎫 할인 선택 <span style="font-size:11px;color:#94a3b8;font-weight:400">(선택사항)</span>';
  discSec.appendChild(discTitle);
  const discGrid=div('discount-grid');
  DISCOUNTS.forEach(d=>{
    const isSel=S.discount&&S.discount.id===d.id;
    const btn=el('button',{class:'discount-btn'+(isSel?' sel':'')});
    btn.appendChild(el('span',{class:'discount-btn-icon'},d.icon));
    btn.appendChild(el('span',{class:'discount-btn-label'},d.label));
    btn.appendChild(el('span',{class:'discount-btn-rate'},d.rate+'% 할인'));
    btn.addEventListener('click',()=>setState({discount:isSel?null:d}));
    discGrid.appendChild(btn);
  });
  const noneBtn=el('button',{class:'discount-btn-none'+(!S.discount?' sel':'')},'할인 없음');
  noneBtn.addEventListener('click',()=>setState({discount:null}));
  discGrid.appendChild(noneBtn);
  discSec.appendChild(discGrid);
  wrap.appendChild(discSec);

  // 포인트 적립 배너
  const hasPhone=S.pointPhone.length===11;
  const pointRow=div('point-notice'+(hasPhone?' done':''));
  pointRow.appendChild(el('span',{class:'point-notice-icon'},hasPhone?'✅':'📲'));
  const ptText=el('span',{class:'point-notice-text'});
  ptText.textContent=hasPhone
    ?'적립 번호: '+S.pointPhone.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3')
    :'포인트 적립 · 전화번호를 입력하세요';
  pointRow.appendChild(ptText);
  pointRow.appendChild(el('span',{class:'point-notice-arrow'},hasPhone?'✏️':'›'));
  pointRow.addEventListener('click',()=>setState({pointPopup:true}));
  wrap.appendChild(pointRow);

  // 결제 수단 (현금 제외)
  const methods=div('pay-methods');
  [{id:'card', label:'신용카드 / 체크카드',  emoji:'💳',sub:'IC칩 · 마그네틱 · 비접촉'},
   {id:'kakao',label:'카카오페이',            emoji:'💛',sub:'카카오페이 앱 QR'},
   {id:'payco',label:'페이코',                emoji:'🔴',sub:'PAYCO 앱 바코드'},
   {id:'naver',label:'네이버페이',            emoji:'💚',sub:'네이버페이 QR'},
   {id:'samsung',label:'삼성페이',            emoji:'🔵',sub:'삼성페이 NFC · MST'},
  ].forEach(m=>{
    const sel=S.payMethod===m.id;
    const b=div('pay-method'+(sel?' sel':''));
    const ico=div('pay-method-ico');ico.textContent=m.emoji;b.appendChild(ico);
    const inf=div('pay-method-info');
    inf.appendChild(el('div',{class:'pay-method-name'},m.label));
    inf.appendChild(el('div',{class:'pay-method-sub'},m.sub));
    b.appendChild(inf);
    if(sel){const chk=div('pay-method-chk');chk.textContent='✓';b.appendChild(chk);}
    b.addEventListener('click',()=>setState({payMethod:m.id}));
    methods.appendChild(b);
  });
  wrap.appendChild(methods);

  // 하단 버튼
  const footer=div('pay-footer');
  const backBtn=el('button',{class:'pay-back'},'← 뒤로');
  backBtn.addEventListener('click',()=>setState({step:1}));
  const goBtn=el('button',{class:'pay-go'+(S.payMethod?'':' disabled')});
  goBtn.textContent='결제하기 '+finalAmt.toLocaleString()+'원 →';
  if(!S.payMethod)goBtn.disabled=true;
  goBtn.addEventListener('click',()=>setState({step:3}));
  footer.appendChild(backBtn);footer.appendChild(goBtn);
  wrap.appendChild(footer);

  // 전화번호 팝업
  if(S.pointPopup) wrap.appendChild(renderPhonePopup());

  return wrap;
}

// ── 전화번호 입력 팝업 ───────────────────────────────────
function renderPhonePopup(){
  const phone=S.pointPhone;
  const ov=div('phone-popup');
  ov.addEventListener('click',e=>{if(e.target===ov)setState({pointPopup:false});});
  const box=div('phone-box');
  box.appendChild(el('div',{class:'phone-title'},'📲 포인트 적립'));
  box.appendChild(el('div',{class:'phone-sub'},'전화번호 11자리를 입력해주세요'));
  const display=div('phone-display');
  display.textContent=phone.length===0?'___ - ____ - ____':
    phone.length<=3?phone:
    phone.length<=7?phone.slice(0,3)+' - '+phone.slice(3):
    phone.slice(0,3)+' - '+phone.slice(3,7)+' - '+phone.slice(7);
  box.appendChild(display);
  const keypad=div('phone-keypad');
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{
    if(k===''){keypad.appendChild(document.createElement('div'));return;}
    const btn=el('button',{class:'phone-key'+(k==='⌫'?' del':'')});
    btn.textContent=k;
    btn.addEventListener('click',()=>{
      if(k==='⌫') setState({pointPhone:phone.slice(0,-1)});
      else if(phone.length<11) setState({pointPhone:phone+k});
    });
    keypad.appendChild(btn);
  });
  box.appendChild(keypad);
  const btns=div('phone-btns');
  const cancelBtn=el('button',{class:'phone-cancel'},'취소');
  cancelBtn.addEventListener('click',()=>setState({pointPopup:false,pointPhone:''}));
  const confirmBtn=el('button',{class:'phone-confirm'+(phone.length!==11?' disabled':'')});
  confirmBtn.textContent=phone.length===11?'✓ 적립 완료':'번호를 입력해주세요';
  confirmBtn.disabled=phone.length!==11;
  confirmBtn.addEventListener('click',()=>{if(phone.length===11)setState({pointPopup:false});});
  btns.appendChild(cancelBtn);btns.appendChild(confirmBtn);
  box.appendChild(btns);
  ov.appendChild(box);
  return ov;
}

function renderDone(){
  const g=grand();
  const wrap=el('div',{style:{flex:'1',display:'flex',flexDirection:'column',overflow:'hidden'}});
  const body=div('done-body');
  body.appendChild(el('div',{class:'done-icon'},'✅'));
  body.appendChild(el('div',{class:'done-title'},'주문이 완료되었습니다!'));
  const nb=div('done-num-box');
  nb.appendChild(el('div',{class:'done-num-label'},'대기번호'));
  nb.appendChild(el('div',{class:'done-num'},'23'));
  const wb=div('done-wait');wb.appendChild(document.createTextNode('⏱ 예상 대기시간 약 '));
  wb.appendChild(el('span',{},'8분'));nb.appendChild(wb);
  nb.appendChild(el('p',{style:{fontSize:'12px',color:'#94a3b8',marginTop:'10px'}},'번호 호출 시 카운터에서 수령해주세요'));
  body.appendChild(nb);

  // 할인 + 적립 정보
  if(S.discount||S.pointPhone.length===11){
    const infoBox=div('done-receipt');
    if(S.discount){
      const discAmtFin=Math.floor(g*S.discount.rate/100);
      const dr=div('done-receipt-row');
      dr.appendChild(el('span',{style:{color:'#e8100a',fontWeight:700}},'🎫 '+S.discount.label+' '+S.discount.rate+'% 할인'));
      dr.appendChild(el('span',{style:{color:'#e8100a',fontWeight:700}},'-'+discAmtFin.toLocaleString()+'원'));
      infoBox.appendChild(dr);
    }
    if(S.pointPhone.length===11){
      const fp=S.pointPhone.slice(0,3)+'-'+S.pointPhone.slice(3,7)+'-'+S.pointPhone.slice(7);
      const pr=div('done-receipt-row');
      pr.appendChild(el('span',{style:{color:'#d97706',fontWeight:700}},'📲 포인트 적립 번호'));
      pr.appendChild(el('span',{style:{color:'#d97706',fontWeight:600}},fp));
      infoBox.appendChild(pr);
      const discAmtFin2=S.discount?Math.floor(g*S.discount.rate/100):0;
      const earnPts=Math.floor((g-discAmtFin2)*0.01);
      const ptRow=div('done-receipt-row');
      ptRow.appendChild(el('span',{style:{color:'#94a3b8',fontSize:'11px'}},'예상 적립 포인트 (1%)'));
      ptRow.appendChild(el('span',{style:{color:'#059669',fontSize:'12px',fontWeight:800}},'+'+earnPts+'P'));
      infoBox.appendChild(ptRow);
    }
    body.appendChild(infoBox);
  }

  const receipt=div('done-receipt');
  receipt.appendChild(el('div',{class:'done-receipt-title'},'주문 내역'));
  S.cart.forEach(item=>{
    const row=div('done-receipt-row');
    row.appendChild(el('span',{},(item.displayName||item.name)+' ×'+item.qty));
    row.appendChild(el('span',{},rowT(item).toLocaleString()+'원'));
    receipt.appendChild(row);
  });
  const discAmtD=S.discount?Math.floor(g*S.discount.rate/100):0;
  const finalD=g-discAmtD;
  const tr=div('done-total-row');
  tr.appendChild(el('span',{},'최종 결제금액'));
  tr.appendChild(el('span',{},finalD.toLocaleString()+'원'));
  receipt.appendChild(tr);
  const rb=div('done-rcpt-btns');
  [['🖨️','영수증 출력'],['✕','영수증 없이']].forEach(([ico,t])=>{
    const b=el('button',{class:'done-rcpt-btn'});b.appendChild(el('span',{style:{fontSize:'20px'}},ico));b.appendChild(document.createTextNode(t));rb.appendChild(b);
  });
  receipt.appendChild(rb);body.appendChild(receipt);
  const hb=el('button',{class:'done-home-btn'},'처음으로');
  hb.addEventListener('click',()=>{S=initState();render();});
  body.appendChild(hb);
  wrap.appendChild(body);return wrap;
}

      dialogue:[

      ],
      missions:['각 사람이 최종 주문한 메뉴를 정리하세요.','키오스크에 주문을 입력하세요.','장바구니를 확인하세요.','총 금액을 확인하세요.'],

        {who:'큰딸',text:'저는 어머니랑 버거 같은 거로요, 음료는 환타로 해주세요.'},

async function generateTask() {
  taskState.loading = true;
  taskState.task = null;
  refreshTaskPanel();

  // 잠깐 로딩 효과 (0.3초)
  await new Promise(r => setTimeout(r, 300));

  try {
    const pool = TASK_BANK[taskState.level] || [];
    if(pool.length === 0) throw new Error('문제 없음');

    // 이전과 다른 문제 선택
    let idx;
    do { idx = Math.floor(Math.random() * pool.length); }
    while(pool.length > 1 && idx === taskState.taskIndex);
    taskState.taskIndex = idx;

    const picked = pool[idx];
    taskState.task = {
      level: taskState.level,
      areas: picked.areas,
      situation: picked.situation,
      dialogue: picked.dialogue,
      missions: picked.missions,
      caution: picked.caution,
    };
  } catch(e) {
    taskState.task = {error: true};
  }

  taskState.loading = false;
  refreshTaskPanel();
}

function renderTaskOverlay() {
  const ov = div('task-overlay');
  ov.addEventListener('click', e => { if(e.target===ov) setState({taskOpen:false}); });

  const panel = div('task-panel');

  // 헤더
  const hdr = div('task-panel-header');
  const title = div('task-panel-title');
  title.innerHTML = '🧠 인지재활 훈련 과제';
  hdr.appendChild(title);
  const closeBtn = el('button',{class:'task-panel-close'},'✕');
  closeBtn.addEventListener('click', ()=>setState({taskOpen:false}));
  hdr.appendChild(closeBtn);
  panel.appendChild(hdr);

  // 바디
  const body = div('task-body');
  panel.appendChild(body);
  ov.appendChild(panel);

  window._taskBody = body;
  fillTaskBody(body);

  return ov;
}

function refreshTaskPanel() {
  const body = window._taskBody;
  if(body) fillTaskBody(body);
}

function fillTaskBody(body) {
  body.innerHTML = '';

  // 난이도 선택
  const lvBox = div('task-level-bar');
  lvBox.appendChild(el('div',{class:'task-level-label'},'📊 난이도 선택'));
  const lvRow = div('task-lv-row');
  TASK_LEVELS.forEach(lv => {
    const btn = el('button',{class:'task-lv-btn'+(taskState.level===lv.id?' on':'')});
    btn.appendChild(el('span',{style:{fontSize:'14px',fontWeight:800}}, lv.label));
    btn.appendChild(el('span',{class:'task-lv-desc'}, lv.desc));
    btn.addEventListener('click',()=>{ taskState.level=lv.id; fillTaskBody(body); });
    lvRow.appendChild(btn);
  });
  lvBox.appendChild(lvRow);
  body.appendChild(lvBox);

  // 생성 버튼
  const genBtn = el('button',{class:'task-gen-btn'});
  genBtn.innerHTML = taskState.loading
    ? '<div class="task-loading-spinner"></div>&nbsp; 문제 생성 중...'
    : '🧠 새 훈련 문제 생성하기';
  genBtn.disabled = taskState.loading;
  genBtn.addEventListener('click', generateTask);
  body.appendChild(genBtn);

  // 로딩
  if(taskState.loading) {
    const ld = div('task-loading');
    ld.appendChild(el('div',{class:'task-loading-spinner'}));
    ld.appendChild(el('div',{style:{fontSize:'15px',fontWeight:700,color:'#64748b'}},'AI가 문제를 만들고 있어요...'));
    ld.appendChild(el('div',{style:{fontSize:'13px',color:'#94a3b8'}},'잠시만 기다려 주세요 😊'));
    body.appendChild(ld);
    return;
  }

  // 빈 상태
  if(!taskState.task) {
    const empty = div('task-empty');
    empty.appendChild(el('div',{class:'task-empty-icon'},'🧠'));
    empty.appendChild(el('div',{class:'task-empty-text'},'훈련 문제를 생성해보세요'));
    empty.appendChild(el('div',{class:'task-empty-sub'},'위 버튼을 누르면 AI가\n새로운 문제를 만들어드립니다'));
    body.appendChild(empty);
    return;
  }

  // 오류
  if(taskState.task.error) {
    const errBox = div('task-card');
    errBox.appendChild(el('div',{style:{textAlign:'center',padding:'20px',color:'#ef4444',fontSize:'14px',fontWeight:700,whiteSpace:'pre-line'}},
      '⚠️ 문제 생성에 실패했습니다.\n다시 시도해주세요.'));
    body.appendChild(errBox);
    return;
  }

  const t = taskState.task;
  const card = div('task-card');

  // 카드 헤더
  const ch = div('task-card-header');
  ch.appendChild(el('span',{style:{fontSize:'20px'}},'📋'));
  ch.appendChild(el('span',{class:'task-card-title'},'훈련 과제'));
  const lvLabel = TASK_LEVELS[taskState.level-1];
  ch.appendChild(el('span',{class:'task-badge task-badge-level'}, lvLabel.label));
  card.appendChild(ch);

  // 훈련 영역
  if(t.areas?.length) {
    const tags = div('task-area-tags');
    t.areas.forEach(a => tags.appendChild(el('span',{class:'task-area-tag'},a)));
    card.appendChild(tags);
  }

  // 상황
  if(t.situation) {
    const sit = div('task-situation');
    sit.appendChild(el('div',{class:'task-section-title'},'📍 상황'));
    sit.appendChild(el('div',{style:{whiteSpace:'pre-line',fontSize:'14px',lineHeight:'1.7'}}, t.situation));
    card.appendChild(sit);
  }

  // 대화
  if(t.dialogue?.length) {
    const dial = div('task-dialogue');
    dial.appendChild(el('div',{class:'task-section-title'},'💬 대화'));
    t.dialogue.forEach(line => {
      const row = div('task-dialogue-line');
      row.appendChild(el('span',{class:'task-who'}, line.who));
      row.appendChild(el('div',{class:'task-text'}, line.text));
      dial.appendChild(row);
    });
    card.appendChild(dial);
  }

  // 미션
  if(t.missions?.length) {
    const mis = div('task-mission');
    mis.appendChild(el('div',{class:'task-section-title'},'✅ 미션'));
    t.missions.forEach((m,i) => {
      const item = div('task-mission-item');
      const num = div('task-mission-num'); num.textContent = i+1;
      item.appendChild(num);
      item.appendChild(el('span',{},m));
      mis.appendChild(item);
    });
    card.appendChild(mis);
  }

  // 주의사항
  if(t.caution) {
    const note = div('task-note');
    note.appendChild(el('div',{class:'task-section-title'},'⚠️ 주의사항'));
    note.appendChild(el('div',{style:{fontSize:'13px'}}, t.caution));
    card.appendChild(note);
  }

  body.appendChild(card);

  // 힌트
  const hint = div('task-hint');
  hint.appendChild(el('div',{class:'task-hint-title'},'💡 이렇게 해보세요'));
  hint.appendChild(el('div',{class:'task-hint-text'},
    '① 대화를 읽고 각 사람의 주문을 추론해보세요\n② 이 창을 닫고 메뉴 탭에서 직접 주문을 입력하세요\n③ 장바구니에서 총 금액을 확인하세요'));
  body.appendChild(hint);
}

// ── 시작 ─────────────────────────────────────────────────
render();


</script>
