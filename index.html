  const d = MENU_DEFAULT_TOPPINGS[menuId];

  const s = {};
  TOPPING_GROUPS.forEach(g => g.items.forEach(i => { s[i.id]=false; }));
  return s;
}
function calcToppingExtra(tops) {
  let e=0; TOPPING_GROUPS.forEach(g=>g.items.forEach(i=>{ if(tops[i.id]&&i.price>0) e+=i.price; })); return e;
}
function toppingSummaryShort(tops, menuId) {
  const d=MENU_DEFAULT_TOPPINGS[menuId]||{};
  const a=[],r=[];
  TOPPING_GROUPS.forEach(g=>g.items.forEach(i=>{

    const t = THEMES[selected];
    return (
      <div className="kiosk-root" style={{fontFamily:"'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif"}}>
        <div style={{background:"#1a1a2e",padding:"5px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",gap:4}}>{["#ff5f57","#febc2e","#28c840"].map((c,i)=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:c}}/>)}</div>
          <span style={{color:"#555",fontSize:9}}>키오스크 시뮬레이터 · {t.label} {t.emoji}</span>
          <span style={{color:"#444",fontSize:9,fontWeight:600}}>v{APP_VER}</span>
        </div>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",minHeight:0}}>
          <item.Component onBack={()=>setSelected(null)} theme={t}/>
        </div>
      </div>
    );
  }
  return (
    <div style={{width:"100%",minHeight:"100svh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:18}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:66,height:66,background:"#fff",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",boxShadow:"0 8px 24px rgba(0,0,0,0.18)"}}>
          <span style={{fontSize:36}}>🖥️</span>
        </div>
        <h1 style={{color:"#fff",fontSize:22,fontWeight:900,margin:0}}>키오스크 체험 훈련</h1>
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:12,margin:"7px 0 0"}}>실제와 유사한 키오스크를 직접 사용해보세요</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,width:"100%",maxWidth:340}}>
        {Object.entries(THEMES).map(([id,t])=>(
          <button key={id} onClick={()=>setSelected(id)}
            onTouchStart={e=>e.currentTarget.style.transform="scale(0.95)"} onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}
            onMouseDown={e=>e.currentTarget.style.transform="scale(0.95)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
            style={{background:"#fff",border:"none",borderRadius:15,padding:"20px 11px",cursor:"pointer",textAlign:"center",boxShadow:"0 4px 18px rgba(0,0,0,0.14)",transition:"transform 0.15s",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:t.primary,borderRadius:"15px 15px 0 0"}}/>
            <div style={{fontSize:36,marginBottom:7}}>{t.emoji}</div>
            <div style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{t.label}</div>
            <div style={{marginTop:9,padding:"4px 11px",background:t.primary,color:"#fff",borderRadius:14,fontSize:11,fontWeight:700}}>시작하기 →</div>
          </button>
        ))}
      </div>
      <div style={{marginTop:24,textAlign:"center"}}>
        <p style={{color:"rgba(255,255,255,0.3)",fontSize:10,margin:0}}>인지재활 훈련용 키오스크 시뮬레이터</p>
        <p style={{color:"rgba(255,255,255,0.22)",fontSize:10,margin:"3px 0 0"}}>v{APP_VER}</p>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<KioskApp />);
  </script>
</body>
</html>
