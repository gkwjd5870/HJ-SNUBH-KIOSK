const MDT={
  1:{lettuce:true,onion:true,tomato:true,pickle:true,jalapeno:false,slice_cheese:false,cheddar:false,mozzarella:false,ketchup:true, mustard:false,mayo:false,bbq:false,spicy:false,ranch:false,patty:false,bacon:false,egg:false,avocado:false},
  2:{lettuce:true,onion:true,tomato:false,pickle:true,jalapeno:false,slice_cheese:false,cheddar:false,mozzarella:false,ketchup:false,mustard:false,mayo:true, bbq:false,spicy:false,ranch:false,patty:false,bacon:false,egg:false,avocado:false},
  3:{lettuce:true,onion:false,tomato:true,pickle:false,jalapeno:false,slice_cheese:false,cheddar:false,mozzarella:false,ketchup:false,mustard:false,mayo:false,bbq:false,spicy:false,ranch:true, patty:false,bacon:false,egg:false,avocado:false},
  4:{lettuce:false,onion:true,tomato:false,pickle:true,jalapeno:false,slice_cheese:true, cheddar:false,mozzarella:false,ketchup:true, mustard:true, mayo:false,bbq:false,spicy:false,ranch:false,patty:false,bacon:false,egg:false,avocado:false},
};
function initT(id){const d=MDT[id];if(d)return{...d};const s={};TOPPING_GROUPS.forEach(g=>g.items.forEach(i=>{s[i.id]=false;}));return s;}
function calcTE(tops){let e=0;TOPPING_GROUPS.forEach(g=>g.items.forEach(i=>{if(tops[i.id]&&i.price>0)e+=i.price;}));return e;}
function tSum(tops,menuId){
  const d=MDT[menuId]||{};const a=[],r=[];
  TOPPING_GROUPS.forEach(g=>g.items.forEach(i=>{
    if(!d[i.id]&&tops[i.id])a.push(i.name);
    if(d[i.id]&&!tops[i.id])r.push(i.name+" 제외");
  }));
  return[...r,...a].join(", ")||"기본 구성";
}

// 음식 사진 컴포넌트
function FoodImg({imgKey,alt,h}){
  const [err,setErr]=useState(false);
  const src=FOOD_IMGS[imgKey];
  if(err||!src) return <div style={{width:"100%",height:h||100,background:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>🍽️</div>;
  return <img src={src} alt={alt||""} onError={()=>setErr(true)} style={{width:"100%",height:h||100,objectFit:"cover",display:"block"}}/>;
}

const CATS=[

  {id:"side",     label:"사이드",  emoji:"🍟"},

// ─── 패스트푸드 키오스크 v1.3 ────────────────────────────────
function FastFoodKiosk({onBack,theme}){
  const t=theme;
  const [step,setStep]=useState(0);
  const [selectedItem,setSelectedItem]=useState(null);
  const [tops,setTops]=useState({});
  const [activeGroup,setActiveGroup]=useState("veg");
  const [cart,setCart]=useState([]);
  const [payMethod,setPayMethod]=useState(null);
  const [orderType,setOrderType]=useState(null);
  const [modal,setModal]=useState(null);   // {type:"size"|"burger_type", item}
  const [activeCat,setActiveCat]=useState("recommend");
  const [cancelConfirm,setCancelConfirm]=useState(false);

  // 장바구니 계산
  const unitPrice=item=>item.basePrice+(item.toppingExtra||0);
  const rowTotal=item=>unitPrice(item)*item.qty;
  const grandTotal=cart.reduce((s,i)=>s+rowTotal(i),0);
  const totalQty=cart.reduce((s,c)=>s+c.qty,0);

  // 장바구니 추가
  const addToCart=(item,toppings,size,subType)=>{
    let bp=item.price??item.basePrice;
    if(subType==="set")   bp=(item.basePrice||item.price)+(item.setAdd||2000);
    if(subType==="large") bp=(item.basePrice||item.price)+(item.largeAdd||2500);
    if(size&&item.hasSize){const sp=SP[item.hasSize];if(sp)bp=sp[size];}
    const te=item.hasToppings?calcTE(toppings):0;
    const displayName=subType==="set"?item.name+" 세트":subType==="large"?item.name+" 라지세트":item.name;
    const ts=item.hasToppings?tSum(toppings,item.id):(size?"사이즈: "+size:null);
    const key=item.id+"_"+(subType||"")+"_"+(size||"")+"_"+JSON.stringify(toppings||{});
    setCart(prev=>{
      const e=prev.find(c=>c.cartKey===key);
      if(e) return prev.map(c=>c.cartKey===key?{...c,qty:c.qty+1}:c);
      return[...prev,{...item,cartKey:key,displayName,basePrice:bp,toppingExtra:te,toppingSummary:ts,selectedSize:size,subType,qty:1}];
    });
  };
  const removeOne=key=>setCart(prev=>{
    const e=prev.find(c=>c.cartKey===key);
    if(!e)return prev;
    if(e.qty===1)return prev.filter(c=>c.cartKey!==key);
    return prev.map(c=>c.cartKey===key?{...c,qty:c.qty-1}:c);
  });
  const addOne=key=>setCart(prev=>prev.map(c=>c.cartKey===key?{...c,qty:c.qty+1}:c));

  // 카테고리별 메뉴
  const getMenu=()=>{
    if(activeCat==="recommend")return RECOMMENDS;
    if(activeCat==="burger")   return BURGERS;
    if(activeCat==="side")     return SIDES;
    if(activeCat==="drink")    return DRINKS;
    if(activeCat==="dessert")  return DESSERTS;
    return RECOMMENDS;
  };

  // 카드 클릭
  const handleCardClick=item=>{
    setSelectedItem(item);
    if(item._cat==="burger"||activeCat==="burger"){
      // 버거: 단품/세트/라지세트 팝업
      setModal({type:"burger_type",item});
    } else if(item.hasToppings){
      setTops(initT(item.id));setActiveGroup("veg");setStep(1.5);
    } else if(item.hasSize){
      setModal({type:"size",item});
    } else {
      addToCart(item,{},null,null);
    }
  };

  // 버전 태그
  const VTag=()=><div style={{textAlign:"right",background:"#fff",padding:"1px 8px 5px",flexShrink:0}}><span style={{fontSize:9,color:"#e2e8f0"}}>v{VER}</span></div>;

  // ── 팝업 모달 ────────────────────────────────────────────────
  const Modal=()=>{
    if(!modal)return null;
    const item=modal.item;
    // 버거 타입 선택 (단품/세트/라지세트)
    if(modal.type==="burger_type"){
      const opts=[
        {id:"single",label:"단 품",        desc:item.name+" 단품",            price:item.basePrice,          icon:"🍔"},
        {id:"set",   label:"세 트",         desc:"버거 + 감자(M) + 음료(M)",   price:item.basePrice+item.setAdd,   icon:"🍔🍟🥤"},
        {id:"large", label:"라 지 세 트",   desc:"버거 + 감자(L) + 음료(L)",   price:item.basePrice+item.largeAdd,  icon:"🍔🍟🥤"},
      ];
      return(
        <div onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}
          style={{position:"absolute",inset:0,background:"rgba(15,23,42,0.55)",zIndex:60,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",padding:"20px 18px 30px"}}>
            <div style={{width:36,height:4,background:"#e2e8f0",borderRadius:2,margin:"0 auto 16px"}}/>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
              <div style={{width:56,height:56,borderRadius:10,overflow:"hidden",background:"#f0f4f8",flexShrink:0}}>
                <FoodImg imgKey={item.img} alt={item.name} h={56}/>
              </div>
              <div>
                <div style={{fontWeight:800,fontSize:16,color:"#1e293b"}}>{item.name}</div>
                <div style={{fontSize:11,color:"#94a3b8"}}>주문 방식을 선택해주세요</div>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:14}}>
              {opts.map((o,i)=>(
                <button key={o.id}
                  onClick={()=>{
                    if(item.hasToppings){
                      setSelectedItem({...item,_subType:o.id});
                      setTops(initT(item.id));setActiveGroup("veg");
                      setModal(null);setStep(1.5);
                    } else {
                      addToCart(item,{},null,o.id);setModal(null);
                    }
                  }}
                  style={{display:"flex",alignItems:"center",gap:14,padding:"13px 16px",background:i===1?"#2563eb":"#f8faff",color:i===1?"#fff":"#1e293b",border:"2px solid "+(i===1?"#2563eb":"#e2e8f0"),borderRadius:12,cursor:"pointer"}}>
                  <span style={{fontSize:20}}>{o.icon}</span>
                  <div style={{flex:1,textAlign:"left"}}>
                    <div style={{fontWeight:700,fontSize:14}}>{o.label}</div>

                  style={{flex:1,padding:"14px 0",background:sz==="M"?"#2563eb":"#f8faff",color:sz==="M"?"#fff":"#1e293b",border:"2px solid "+(sz==="M"?"#2563eb":"#e2e8f0"),borderRadius:12,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>

                  {sz==="M"&&<span style={{fontSize:9,background:"rgba(255,255,255,0.2)",padding:"1px 5px",borderRadius:8,color:"#fff",fontWeight:700}}>추천</span>}
                </button>

            </div>
            <button onClick={()=>setModal(null)} style={{width:"100%",padding:11,background:"#f1f5f9",border:"none",borderRadius:10,fontWeight:700,fontSize:14,color:"#64748b"}}>취소</button>

  // ── 취소 확인 팝업 ────────────────────────────────────────────
  const CancelConfirmModal=()=>{

    return(
      <div style={{position:"absolute",inset:0,background:"rgba(15,23,42,0.55)",zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

          <div style={{fontSize:44,marginBottom:12}}>⚠️</div>
          <div style={{fontWeight:800,fontSize:17,color:"#1e293b",marginBottom:8}}>주문을 취소하시겠습니까?</div>
          <div style={{fontSize:13,color:"#64748b",marginBottom:22,lineHeight:1.5}}>장바구니에 담긴 메뉴가 모두 삭제되고<br/>처음 화면으로 돌아갑니다.</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setCancelConfirm(false)}
              style={{flex:1,padding:"12px 0",background:"#f1f5f9",border:"none",borderRadius:10,fontWeight:700,fontSize:14,color:"#64748b"}}>계속 주문</button>
            <button onClick={()=>{setCancelConfirm(false);setCart([]);setStep(0);setPayMethod(null);}}
              style={{flex:1,padding:"12px 0",background:"#dc2626",border:"none",borderRadius:10,fontWeight:700,fontSize:14,color:"#fff"}}>주문 취소</button>
          </div>
        </div>
      </div>
    );
  };

  // ── 하단 장바구니 패널 ────────────────────────────────────────
  const CartPanel=()=>(
    <div style={{background:"#fff",borderTop:"2px solid #2563eb",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 14px",background:"#eff6ff",borderBottom:"1px solid #dbeafe"}}>
        <span style={{fontWeight:800,fontSize:13,color:"#1d4ed8"}}>🛒 주문 내역 <span style={{fontSize:11,fontWeight:600,color:"#3b82f6"}}>({totalQty}개)</span></span>
        {cart.length>0&&(
          <button onClick={()=>setCancelConfirm(true)}
            style={{background:"none",border:"none",fontSize:10,color:"#94a3b8",cursor:"pointer",padding:"2px 6px"}}>전체 삭제</button>
        )}
      </div>
      <div style={{maxHeight:148,overflowY:"auto"}}>
        {cart.length===0?(
          <div style={{padding:"10px 14px",textAlign:"center",color:"#cbd5e1",fontSize:12}}>메뉴를 선택하면 여기에 담깁니다</div>
        ):cart.map(item=>(
          <div key={item.cartKey} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderBottom:"1px solid #f1f5f9"}}>
            <div style={{width:36,height:36,borderRadius:8,overflow:"hidden",background:"#f0f5ff",flexShrink:0}}>
              <FoodImg imgKey={item.img} alt={item.name} h={36}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:11,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {item.displayName}
                {item.selectedSize&&<span style={{marginLeft:3,fontSize:9,background:"#eff6ff",color:"#2563eb",padding:"1px 4px",borderRadius:4}}>{item.selectedSize}</span>}
              </div>
              {item.toppingSummary&&item.toppingSummary!=="기본 구성"&&<div style={{fontSize:9,color:"#94a3b8"}}>{item.toppingSummary}</div>}
              <div style={{fontSize:11,color:"#2563eb",fontWeight:700}}>{unitPrice(item).toLocaleString()}원</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
              <button onClick={()=>removeOne(item.cartKey)} style={{width:24,height:24,borderRadius:"50%",border:"1.5px solid #e2e8f0",background:"#fff",color:"#64748b",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
              <span style={{fontWeight:700,fontSize:13,minWidth:16,textAlign:"center"}}>{item.qty}</span>
              <button onClick={()=>addOne(item.cartKey)} style={{width:24,height:24,borderRadius:"50%",border:"none",background:"#2563eb",color:"#fff",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
            <div style={{fontWeight:700,fontSize:12,color:"#1e293b",minWidth:50,textAlign:"right"}}>{rowTotal(item).toLocaleString()}원</div>
          </div>
        ))}
      </div>
      {cart.length>0&&(
        <div style={{padding:"8px 14px 10px",display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}>
            <span style={{fontSize:11,color:"#64748b"}}>총 합계 </span>
            <span style={{fontSize:17,fontWeight:900,color:"#2563eb"}}>{grandTotal.toLocaleString()}원</span>
          </div>
          <button onClick={()=>setStep(4)}
            style={{padding:"10px 18px",background:"#2563eb",color:"#fff",border:"none",borderRadius:10,fontWeight:800,fontSize:14,cursor:"pointer",whiteSpace:"nowrap"}}>
            결제하기 →
          </button>
        </div>
      )}
    </div>
  );

  // ── 하단 네비 바 ─────────────────────────────────────────────
  const NavBar=({onPrev})=>(
    <div style={{display:"flex",alignItems:"stretch",borderTop:"1px solid #e8eaf0",background:"#fff",flexShrink:0}}>
      {[
        {label:"처음으로",icon:"🏠",action:()=>{ if(cart.length>0){setCancelConfirm(true);}else{setStep(0);} }},
        {label:"이전 화면",icon:"←", action:onPrev||null},
        {label:"쿠폰 사용",icon:"🎫",action:null,hi:true},
        {label:"장바구니",icon:"🛒", action:()=>totalQty>0&&setStep(3),badge:totalQty||null},
      ].map((b,i)=>(
        <button key={i} onClick={b.action||undefined}
          style={{flex:1,padding:"9px 2px 7px",background:b.hi?"#eff6ff":"#fff",border:"none",cursor:b.action?"pointer":"default",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:b.hi?"#2563eb":"#555",fontWeight:b.hi?700:500,position:"relative",opacity:(!b.action&&!b.hi)?0.35:1,minWidth:0}}>

        </button>

    </div>

  // ── 메뉴 카드 ────────────────────────────────────────────────
  const Card=({item})=>{
    const inCart=cart.filter(c=>c.id===item.id).reduce((s,c)=>s+c.qty,0);
    const isBurger=activeCat==="burger"||(activeCat==="recommend"&&item._cat==="burger");
    const showPrice=item.hasSize?`${SP[item.hasSize]?.S?.toLocaleString()}원~`:
                    isBurger?`${item.basePrice.toLocaleString()}원`:
                    `${item.price.toLocaleString()}원`;
    return(
      <div onClick={()=>handleCardClick(item)}
        style={{background:"#fff",border:inCart?"2px solid #2563eb":"2px solid #eef0f5",borderRadius:13,overflow:"hidden",cursor:"pointer",position:"relative",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",display:"flex",flexDirection:"column"}}>
        {item.tag&&<span style={{position:"absolute",top:7,left:7,background:item.tag==="인기"?"#2563eb":item.tag==="신메뉴"?"#f59e0b":"#94a3b8",color:"#fff",fontSize:9,padding:"2px 6px",borderRadius:20,fontWeight:700,zIndex:1}}>{item.tag}</span>}
        {inCart>0&&<span style={{position:"absolute",top:7,right:7,background:"#2563eb",color:"#fff",fontSize:9,width:19,height:19,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,zIndex:1}}>{inCart}</span>}
        <div style={{height:100,flexShrink:0}}>
          <FoodImg imgKey={item.img} alt={item.name} h={100}/>
        </div>
        <div style={{padding:"8px 9px 10px",flex:1,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
          <div>
            <div style={{fontWeight:700,fontSize:12,color:"#1e293b",marginBottom:2,lineHeight:1.3}}>{item.name}</div>
            <div style={{fontSize:9,color:"#94a3b8",lineHeight:1.3}}>{item.desc}</div>
          </div>
          <div style={{marginTop:5}}>
            <div style={{fontWeight:800,fontSize:14,color:"#2563eb"}}>{showPrice}</div>
            {item.hasToppings&&<div style={{fontSize:9,color:"#94a3b8",marginTop:1}}>재료 변경 가능</div>}
            {item.hasSize&&<div style={{fontSize:9,color:"#2563eb",marginTop:1,fontWeight:600}}>S / M / L 선택</div>}
            {isBurger&&!item.hasToppings&&<div style={{fontSize:9,color:"#94a3b8",marginTop:1}}>단품 / 세트 선택</div>}
          </div>
        </div>
      </div>
    );
  };

  // ── 0단계: 홈 ────────────────────────────────────────────────
  if(step===0)return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#f0f5ff",position:"relative"}}>
      <div style={{background:"#2563eb",padding:"14px 18px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:40,height:40,background:"#fff",borderRadius:9,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <FoodImg imgKey="bulgogi" alt="logo" h={40}/>
          </div>
          <div>
            <div style={{color:"#fff",fontWeight:900,fontSize:14}}>SNUBH BURGER</div>
            <div style={{color:"rgba(255,255,255,0.65)",fontSize:9}}>분당서울대학교병원 고객식당</div>
          </div>
        </div>
        <div style={{display:"flex",gap:7}}>
          <button style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",color:"#fff",padding:"5px 9px",borderRadius:16,fontSize:10,cursor:"pointer"}}>🌐 언어</button>
          <button style={{background:"#fff",border:"none",color:"#2563eb",padding:"5px 9px",borderRadius:16,fontSize:10,fontWeight:700,cursor:"pointer"}}>🔔 직원호출</button>
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 22px",gap:16}}>
        <h1 style={{margin:0,fontSize:21,fontWeight:900,color:"#1e293b",textAlign:"center"}}>주문 방식을 선택해주세요</h1>
        <p style={{margin:0,color:"#64748b",fontSize:13,textAlign:"center"}}>원하는 버튼을 터치해 주세요</p>
        <div style={{display:"flex",gap:14,width:"100%",maxWidth:320,marginTop:6}}>
          {[{label:"매장 식사",emoji:"🍽️",value:"dine"},{label:"포장 주문",emoji:"🛍️",value:"take"}].map(o=>(
            <button key={o.value} onClick={()=>{setOrderType(o.value);setStep(1);}}
              onTouchStart={e=>e.currentTarget.style.transform="scale(0.96)"} onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}
              onMouseDown={e=>e.currentTarget.style.transform="scale(0.96)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
              style={{flex:1,padding:"22px 10px",background:"#fff",border:"2px solid #e2e8f0",borderRadius:14,cursor:"pointer",fontWeight:700,color:"#2563eb",display:"flex",flexDirection:"column",alignItems:"center",gap:9,boxShadow:"0 2px 10px rgba(37,99,235,0.08)",fontSize:14}}>
              <span style={{fontSize:32}}>{o.emoji}</span><span>{o.label}</span>
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"9px 18px",background:"#fff",borderTop:"1px solid #eef0f5",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <span style={{fontSize:10,color:"#94a3b8"}}>ⓘ 알레르기 정보는 직원에게 문의해 주세요</span>
        <button onClick={onBack} style={{background:"none",border:"1px solid #e2e8f0",color:"#94a3b8",padding:"3px 8px",borderRadius:14,fontSize:9}}>← 뒤로</button>
      </div>
      <VTag/>
    </div>
  );

  // ── 1단계: 메뉴 선택 ─────────────────────────────────────────
  if(step===1)return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#f8faff",position:"relative"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #eef0f5",padding:"10px 14px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:24,height:24,background:"#2563eb",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:12}}>🍔</span>
            </div>
            <span style={{fontWeight:800,fontSize:12,color:"#1e293b"}}>SNUBH BURGER</span>
          </div>
          <div style={{display:"flex",gap:5}}>
            <button style={{background:"#f1f5f9",border:"none",color:"#64748b",padding:"4px 8px",borderRadius:12,fontSize:9,cursor:"pointer"}}>🌐 언어</button>
            <button style={{background:"#2563eb",border:"none",color:"#fff",padding:"4px 8px",borderRadius:12,fontSize:9,fontWeight:700,cursor:"pointer"}}>🔔 직원호출</button>

        </div>
        <div style={{fontSize:12,color:"#1e293b",fontWeight:700}}>메뉴를 선택해주세요</div>
        <div style={{fontSize:10,color:"#94a3b8"}}>원하는 메뉴를 터치하여 선택해 주세요.</div>
      </div>
      <div style={{flex:1,overflow:"hidden",display:"flex",minHeight:0}}>
        {/* 사이드바 */}
        <div style={{width:64,background:"#fff",borderRight:"1px solid #eef0f5",display:"flex",flexDirection:"column",overflowY:"auto",flexShrink:0}}>
          {CATS.map(cat=>(
            <button key={cat.id} onClick={()=>setActiveCat(cat.id)}
              style={{padding:"11px 2px",background:activeCat===cat.id?"#eff6ff":"transparent",borderLeft:activeCat===cat.id?"3px solid #2563eb":"3px solid transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,flexShrink:0}}>
              <span style={{fontSize:18}}>{cat.emoji}</span>
              <span style={{fontSize:8,fontWeight:activeCat===cat.id?800:500,color:activeCat===cat.id?"#2563eb":"#64748b",lineHeight:1.2,textAlign:"center"}}>{cat.label}</span>
            </button>
          ))}
        </div>
        {/* 메뉴 그리드 */}
        <div style={{flex:1,overflowY:"auto",padding:"8px 7px 8px 8px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,alignContent:"start"}}>
          {getMenu().map(item=><Card key={item.id+"-"+activeCat} item={item}/>)}
        </div>
      </div>
      <CartPanel/>
      <NavBar onPrev={()=>{if(cart.length>0){setCancelConfirm(true);}else{setStep(0);}}}/>
      <VTag/>
      <Modal/>
      <CancelConfirmModal/>
    </div>
  );

  // ── 1.5단계: 토핑 ────────────────────────────────────────────
  if(step===1.5&&selectedItem){
    const te=calcTE(tops);
    const baseP=(selectedItem._subType==="set"?(selectedItem.basePrice+selectedItem.setAdd):
                 selectedItem._subType==="large"?(selectedItem.basePrice+selectedItem.largeAdd):
                 (selectedItem.basePrice||selectedItem.price));
    const finalP=baseP+te;
    const cg=TOPPING_GROUPS.find(g=>g.groupId===activeGroup);
    const defs=MDT[selectedItem.id]||{};
    const changed=Object.keys(tops).filter(k=>!!tops[k]!==!!defs[k]).length;
    return(
      <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#f8faff"}}>
        <div style={{background:"#2563eb",padding:"9px 13px",display:"flex",alignItems:"center",gap:9,flexShrink:0}}>
          <button onClick={()=>setStep(1)} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:14,fontWeight:700}}>←</button>
          <div style={{flex:1}}>
            <div style={{color:"#fff",fontWeight:800,fontSize:13}}>{selectedItem.name} — 재료변경</div>
            <div style={{color:"rgba(255,255,255,0.72)",fontSize:10}}>{changed>0?(changed+"가지 변경됨"):"기본 구성"}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:"#fff",fontWeight:900,fontSize:15}}>{finalP.toLocaleString()}원</div>
            {te>0&&<div style={{color:"#fde68a",fontSize:9,fontWeight:700}}>+{te.toLocaleString()}원</div>}
          </div>
        </div>
        {/* 버거 미리보기 */}
        <div style={{background:"#fff",padding:"9px 13px 7px",borderBottom:"1px solid #eef0f5",display:"flex",alignItems:"center",gap:11,flexShrink:0}}>
          <div style={{width:72,height:60,borderRadius:9,overflow:"hidden",background:"#f0f4f8",flexShrink:0}}>
            <FoodImg imgKey={selectedItem.img} alt={selectedItem.name} h={60}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:9,color:"#94a3b8",marginBottom:3}}>현재 구성</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
              {TOPPING_GROUPS.flatMap(g=>g.items).filter(it=>tops[it.id]).map(it=>{
                const isNew=!defs[it.id];
                return<span key={it.id} style={{fontSize:9,padding:"2px 5px",borderRadius:8,fontWeight:700,background:isNew?"#2563eb":"#f1f5f9",color:isNew?"#fff":"#64748b"}}>{isNew&&"+"}{it.name}</span>;
              })}
              {TOPPING_GROUPS.flatMap(g=>g.items).filter(it=>!tops[it.id]&&defs[it.id]).map(it=>(
                <span key={it.id} style={{fontSize:9,padding:"2px 5px",borderRadius:8,fontWeight:700,background:"#fff0f0",color:"#dc2626",textDecoration:"line-through"}}>{it.name}</span>
              ))}
            </div>
          </div>
        </div>
        {/* 탭 */}
        <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #eef0f5",flexShrink:0}}>
          {TOPPING_GROUPS.map(g=>{
            const cnt=g.items.filter(it=>tops[it.id]).length;
            return(
              <button key={g.groupId} onClick={()=>setActiveGroup(g.groupId)}
                style={{flex:1,padding:"7px 3px",background:"none",border:"none",borderBottom:activeGroup===g.groupId?"3px solid #2563eb":"3px solid transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative"}}>

        <div style={{flex:1,overflow:"auto",padding:8}}>

            {cg&&cg.items.map(item=>{

              return(
                <button key={item.id} onClick={()=>setTops(prev=>({...prev,[item.id]:!prev[item.id]}))}

        <div style={{background:"#fff",borderTop:"1px solid #eef0f5",padding:"9px 11px",flexShrink:0}}>

  // ── 4단계: 결제 ──────────────────────────────────────────────
  if(step===4)return(

            <div key={item.cartKey} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#334155",marginBottom:2}}>

              <span>{rowTotal(item).toLocaleString()}원</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:15,color:"#2563eb",paddingTop:6,borderTop:"1px solid #bfdbfe",marginTop:4}}>

      </div>
      <div style={{flex:1,padding:13,display:"flex",flexDirection:"column",gap:9,overflowY:"auto"}}>

          {id:"kakao",label:"카카오페이",                emoji:"💛",sub:"카카오페이 앱 QR코드"},

            <span style={{fontSize:22}}>{m.emoji}</span>
            <div style={{flex:1,textAlign:"left"}}>
              <div style={{fontWeight:700,fontSize:13}}>{m.label}</div>
              <div style={{fontSize:10,color:payMethod===m.id?"rgba(255,255,255,0.7)":"#94a3b8",marginTop:1}}>{m.sub}</div>

        <button onClick={()=>payMethod&&setStep(5)} style={{flex:2,padding:12,background:payMethod?"#2563eb":"#94a3b8",color:"#fff",border:"none",borderRadius:9,fontWeight:800,cursor:payMethod?"pointer":"not-allowed",fontSize:14}}>결제 →</button>
      </div>
      <VTag/>
      <CancelConfirmModal/>
    </div>
  );

  // ── 5단계: 완료 ──────────────────────────────────────────────
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#f8faff"}}>

        <span style={{color:"#fff",fontWeight:800,fontSize:14}}>주문 완료</span>
      </div>
      <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16,gap:12}}>
        <div style={{fontSize:56}}>✅</div>

          <div style={{fontSize:60,fontWeight:900,color:"#2563eb",lineHeight:1}}>23</div>
          <div style={{marginTop:10,padding:"8px 14px",background:"#eff6ff",borderRadius:10,display:"inline-block"}}>
            <span style={{fontSize:12,color:"#1d4ed8",fontWeight:700}}>⏱ 예상 대기시간 약 </span>

          </div>

        </div>
        <div style={{background:"#fff",borderRadius:11,padding:13,width:"100%",border:"1px solid #eef0f5"}}>
          <div style={{fontWeight:700,marginBottom:7,color:"#1e293b",fontSize:12}}>주문 내역</div>
          {cart.map(item=>(
            <div key={item.cartKey} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#64748b",marginBottom:4}}>
              <span>{item.displayName}{item.selectedSize&&" ("+item.selectedSize+")"} ×{item.qty}</span>

          <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,color:"#2563eb",paddingTop:7,borderTop:"1px solid #eef0f5",fontSize:13}}><span>합계</span><span>{grandTotal.toLocaleString()}원</span></div>

        <div style={{background:"#fff",borderRadius:11,padding:"10px 13px",width:"100%",border:"1px solid #eef0f5"}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:7,textAlign:"center"}}>영수증을 선택해주세요</div>
          <div style={{display:"flex",gap:8}}>
            {[{label:"영수증 출력",icon:"🖨️"},{label:"영수증 없이",icon:"✕"}].map(r=>(
              <button key={r.label} style={{flex:1,padding:"9px 0",background:"#f8faff",border:"1px solid #e2e8f0",borderRadius:9,fontWeight:600,fontSize:11,color:"#64748b",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <span style={{fontSize:16}}>{r.icon}</span><span>{r.label}</span>

      <div style={{padding:"9px 12px",background:"#fff",borderTop:"1px solid #eef0f5",flexShrink:0}}>
        <button onClick={()=>{setStep(0);setCart([]);setPayMethod(null);}} style={{width:"100%",padding:13,background:"#2563eb",color:"#fff",border:"none",borderRadius:10,fontWeight:800,cursor:"pointer",fontSize:14}}>처음으로</button>
      </div>
      <VTag/>
    </div>
  );
}


// ─── 은행 키오스크 (신한은행 ATM 실제 플로우) ─────────────────
// 0홈 → 1매체선택 → 3카드삽입 → 4불법카드복제안내

  const [step, setStep] = useState(0);
  const [service, setService] = useState(null);
  const [accountNum, setAccountNum] = useState("");
  const [amount, setAmount] = useState("");
  const [pin, setPin] = useState("");
  const t = theme;

  const services = [
    { id:"withdraw", label:"예금 출금",      desc:"만권·오만권만 출금가능" },

    { id:"deposit",  label:"입금/무통장송금", desc:"현금 입금"              },
    { id:"card",     label:"신용카드업무",    desc:"카드대출·간편신청"       },
    { id:"tmoney",   label:"Tmoney/hi-pass", desc:"교통카드 충전"          },
    { id:"tax",      label:"국세/지방세",     desc:"공과금·등록금 납부"     },
    { id:"other",    label:"다른 업무",       desc:"Foreign Languages"      },
  ];

  // 숫자 패드 (ATM 스타일 — 어두운 배경)
  const NumPad = ({ value, onChange, maxLen=4, secret=false }) => (
    <div>
      <div style={{ background:"#1a3a6b", borderRadius:8, padding:"9px 13px", textAlign:"center", marginBottom:13, minHeight:42, display:"flex", alignItems:"center", justifyContent:"center", gap:9 }}>
        <span style={{ color:"#aac4ff", fontSize:12, fontWeight:600 }}>비밀번호 :</span>
        <span style={{ color:"#fff", fontSize:20, letterSpacing:10, fontWeight:700 }}>
          {secret ? "●".repeat(value.length) : value}
        </span>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:5 }}>
        {["1","2","3","4","5","6","7","8","9","","0","←"].map((n,i)=>(
          <button key={i} onClick={()=>{
            if(n==="←") onChange(value.slice(0,-1));
            else if(n!==""&&value.length<maxLen) onChange(value+n);

  // 공통 헤더: 취소(빨강) | 타이틀 | 확인(초록)

    <div style={{ display:"flex", alignItems:"stretch", background:"#1a1a1a", minHeight:46 }}>
      {onCancel!==false && (
        <button onClick={onCancel||(() => setStep(0))} style={{ flex:1, background:"#8B1A1A", color:"#fff", border:"none", fontWeight:700, fontSize:13, cursor:"pointer", letterSpacing:2 }}>{cancelLabel}</button>
      )}

      <div style={{ background:"#0d1f42", padding:"6px 12px", borderTop:"1px solid #1a3060", display:"flex", justifyContent:"center" }}>
        <button onClick={onBack} style={{ background:"none", border:"1px solid #2a5a9a", color:"#6ab0ff", padding:"4px 14px", borderRadius:16, cursor:"pointer", fontSize:11 }}>← 키오스크 선택으로</button>
      </div>
    </div>

  // ── 1단계: 매체 선택
  if (step === 1) return (

      <ATMHeader title="매 체 선 택" onCancel={()=>setStep(0)}/>
      <div style={{ flex:1, display:"grid", gridTemplateColumns:"1fr auto 1fr", gap:0, padding:9, alignContent:"center" }}>
        <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
          {[{label:"바이오인증\n(손바닥정맥)",gold:true},{label:"간편 앱 출금"},{label:"superSOL\n신한포인트 출금"},{label:"창구 연계 출금"},{label:"SAMSUNG Wallet\nN Pay"}].map((b,i)=>(

      <div style={{ padding:14, background:"#fff" }}>
        <button onClick={()=>nameInput&&birthInput.length===6&&setStep(service?.id==="checkin"?2:service?.id==="payment"?3:4)}
          style={{ width:"100%", padding:14, background:nameInput&&birthInput.length===6?t.primary:"#ccc", color:"#fff", border:"none", borderRadius:11, fontWeight:700, cursor:nameInput&&birthInput.length===6?"pointer":"not-allowed", fontSize:15 }}>확인 →</button>
      </div>
    </div>
  );
  if (step===2) return (
    <div style={{ height:"100%", display:"flex", flexDirection:"column" }}>
      <div style={{ background:t.header, padding:"11px 16px", display:"flex", alignItems:"center", gap:11 }}>
        <button onClick={()=>setStep(1)} style={{ background:"none", border:"1px solid rgba(255,255,255,0.4)", color:"#fff", borderRadius:8, padding:"5px 11px", cursor:"pointer" }}>←</button>
        <span style={{ color:"#fff", fontWeight:700, fontSize:15 }}>진료과 선택</span>
      </div>
      <div style={{ flex:1, padding:11, background:t.bg, display:"grid", gridTemplateColumns:"1fr 1fr", gap:9, overflowY:"auto" }}>
        {depts.map(d=>(
          <button key={d.id} onClick={()=>{ setDept(d); setStep(4); }}
            style={{ background:"#fff", border:dept?.id===d.id?`2px solid ${t.primary}`:"2px solid transparent", borderRadius:13, padding:"13px 9px", cursor:"pointer", textAlign:"center", boxShadow:"0 2px 8px rgba(0,0,0,0.07)" }}>
            <div style={{ fontSize:28, marginBottom:5 }}>{d.emoji}</div>
            <div style={{ fontWeight:700, fontSize:13, color:"#222" }}>{d.name}</div>
            <div style={{ fontSize:10, color:"#888", marginTop:3 }}>대기 {d.wait}명</div>
          </button>
        ))}
      </div>
    </div>
  );
  if (step===3) return (
    <div style={{ height:"100%", display:"flex", flexDirection:"column" }}>
      <div style={{ background:t.header, padding:"13px 16px", display:"flex", alignItems:"center", gap:11 }}>
        <button onClick={()=>setStep(1)} style={{ background:"none", border:"1px solid rgba(255,255,255,0.4)", color:"#fff", borderRadius:8, padding:"5px 11px", cursor:"pointer" }}>←</button>
        <span style={{ color:"#fff", fontWeight:700, fontSize:16 }}>수납/결제</span>
      </div>
      <div style={{ flex:1, padding:14, background:t.bg }}>
        <div style={{ background:"#fff", borderRadius:15, padding:18, boxShadow:"0 2px 12px rgba(0,0,0,0.07)", marginBottom:11 }}>
          <p style={{ fontWeight:700, margin:"0 0 13px", color:"#444" }}>미수납 내역</p>
          {[["진찰료","15,000원"],["검사비","28,000원"],["약제비","8,500원"]].map(([k,v])=>(
            <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:"1px solid #f5f5f5", fontSize:13, color:"#555" }}><span>{k}</span><span>{v}</span></div>
          ))}
          <div style={{ display:"flex", justifyContent:"space-between", paddingTop:9, fontWeight:800, color:t.primary, fontSize:16 }}><span>총 수납금액</span><span>51,500원</span></div>
        </div>
        <div style={{ background:"#fff", borderRadius:15, padding:14, boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
          <p style={{ fontWeight:700, margin:"0 0 11px", color:"#444" }}>결제 방법</p>
          {["💳 신용카드","💛 카카오페이","💵 현금"].map(m=>(
            <button key={m} onClick={()=>setStep(4)} style={{ display:"block", width:"100%", padding:"13px 14px", marginBottom:7, background:"#f5f7ff", border:"none", borderRadius:9, cursor:"pointer", textAlign:"left", fontWeight:600, fontSize:14, color:"#333" }}>{m}</button>
          ))}
        </div>
      </div>
    </div>
  );
  return (
    <div style={{ height:"100%", display:"flex", flexDirection:"column" }}>
      <div style={{ background:t.header, padding:"13px 16px" }}><span style={{ color:"#fff", fontWeight:700, fontSize:16 }}>완료</span></div>
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:22, gap:14, background:t.bg }}>
        <div style={{ fontSize:70 }}>✅</div>
        <h2 style={{ margin:0, fontSize:22, fontWeight:900, color:"#222", textAlign:"center" }}>
          {service?.id==="checkin"?"접수 완료":service?.id==="payment"?"수납 완료":"발급 완료"}
        </h2>
        <div style={{ background:"#fff", borderRadius:15, padding:22, width:"100%", boxShadow:"0 4px 16px rgba(0,0,0,0.08)", textAlign:"center" }}>
          {service?.id==="checkin"&&dept ? (
            <>
              <div style={{ fontSize:14, color:"#888", marginBottom:3 }}>{dept.name} 대기번호</div>
              <div style={{ fontSize:54, fontWeight:900, color:t.primary }}>{10+dept.wait}</div>
              <div style={{ color:"#888", fontSize:12, marginTop:7 }}>현재 대기 {dept.wait}명 · 예상 대기시간 약 {dept.wait*8}분</div>
            </>
          ) : (
            <><div style={{ fontSize:54 }}>✓</div><p style={{ color:"#666", margin:0, fontSize:14 }}>처리가 완료되었습니다</p></>
          )}
          <p style={{ color:"#aaa", margin:"11px 0 0", fontSize:11 }}>영수증이 필요하신 경우 하단 프린터에서 출력해 주세요</p>
        </div>
      </div>
      <div style={{ padding:14, background:"#fff" }}>
        <button onClick={()=>{ setStep(0); setDept(null); setNameInput(""); setBirthInput(""); }}
          style={{ width:"100%", padding:14, background:t.primary, color:"#fff", border:"none", borderRadius:11, fontWeight:700, cursor:"pointer", fontSize:15 }}>처음으로</button>
      </div>
    </div>
  );
};



// ─── 메인 앱 ─────────────────────────────────────────────────
function KioskApp(){
  const [selected,setSelected]=useState(null);
  const list=[
    {id:"fastfood",Component:FastFoodKiosk},
    {id:"bank",    Component:BankKiosk},
    {id:"pharmacy",Component:PharmacyKiosk},
    {id:"hospital",Component:HospitalKiosk},
  ];
  if(selected){
    const item=list.find(k=>k.id===selected);
    const t=THEMES[selected];
    return(
      <div className="kw" style={{fontFamily:"'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif"}}>
        <div style={{background:"#1a1a2e",padding:"5px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",gap:4}}>{["#ff5f57","#febc2e","#28c840"].map((c,i)=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:c}}/>)}</div>
          <span style={{color:"#555",fontSize:9}}>키오스크 시뮬레이터 · {t.label} {t.emoji}</span>
          <span style={{color:"#444",fontSize:9,fontWeight:600}}>v{VER}</span>
        </div>
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",minHeight:0}}>
          <item.Component onBack={()=>setSelected(null)} theme={t}/>
        </div>
      </div>
    );
  }
  return(
    <div style={{width:"100%",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:18}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:66,height:66,background:"#fff",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",boxShadow:"0 8px 24px rgba(0,0,0,0.18)"}}>
          <span style={{fontSize:36}}>🖥️</span>
        </div>
        <h1 style={{color:"#fff",fontSize:22,fontWeight:900,margin:0}}>키오스크 체험 훈련</h1>
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:12,margin:"7px 0 0"}}>실제와 유사한 키오스크를 직접 사용해보세요</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,width:"100%",maxWidth:340}}>
        {Object.entries(THEMES).map(([id,t])=>(
          <button key={id} onClick={()=>setSelected(id)}
            onTouchStart={e=>e.currentTarget.style.transform="scale(0.95)"} onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}
            onMouseDown={e=>e.currentTarget.style.transform="scale(0.95)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
            style={{background:"#fff",border:"none",borderRadius:15,padding:"20px 11px",cursor:"pointer",textAlign:"center",boxShadow:"0 4px 18px rgba(0,0,0,0.14)",transition:"transform 0.15s",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:t.primary,borderRadius:"15px 15px 0 0"}}/>
            <div style={{fontSize:36,marginBottom:7}}>{t.emoji}</div>
            <div style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{t.label}</div>
            <div style={{marginTop:9,padding:"4px 11px",background:t.primary,color:"#fff",borderRadius:14,fontSize:11,fontWeight:700}}>시작하기 →</div>
          </button>
        ))}
      </div>
      <div style={{marginTop:24,textAlign:"center"}}>
        <p style={{color:"rgba(255,255,255,0.3)",fontSize:10,margin:0}}>인지재활 훈련용 키오스크 시뮬레이터</p>
        <p style={{color:"rgba(255,255,255,0.22)",fontSize:10,margin:"3px 0 0"}}>v{VER}</p>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<KioskApp/>);
  </script>
</body>
